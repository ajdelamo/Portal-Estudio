<!DOCTYPE html>

<title>LPAC · Test Adaptativo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f4;color:#1a1a18;min-height:100vh;padding:1rem}
.wrap{max-width:780px;margin:0 auto}
h1{font-size:17px;font-weight:600;margin-bottom:1rem;color:#1a1a18}
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.8rem}
.nb{padding:5px 12px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#5f5e5a;font-size:13px;cursor:pointer}
.nb.active{background:#e6f1fb;color:#185fa5;border-color:#185fa5}
.nb:hover:not(.active){background:#f1efe8}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.8rem}
.stat{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:.6rem .8rem;text-align:center}
.stat-n{font-size:20px;font-weight:600}
.stat-l{font-size:11px;color:#888780;margin-top:1px}
.unit-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.8rem}
.ubar{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:7px 9px;cursor:pointer}
.ubar:hover{border-color:#185fa5}
.ubar-title{font-size:11px;color:#888780;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ubar-track{height:5px;background:#f1efe8;border-radius:3px;overflow:hidden;margin-bottom:2px}
.ubar-fill{height:100%;border-radius:3px;transition:width .3s}
.ubar-pct{font-size:10px;color:#888780}
.prog-wrap{height:3px;background:#d3d1c7;border-radius:2px;margin-bottom:.8rem;overflow:hidden}
.prog-bar{height:100%;background:#185fa5;border-radius:2px;transition:width .3s}
.ctrl{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap}
.btn{padding:6px 13px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;font-size:13px;cursor:pointer}
.btn:hover{background:#f1efe8}
.btn.active{background:#e6f1fb;color:#185fa5;border-color:#185fa5}
.btn.danger{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.qcard{background:#fff;border:1.5px solid #d3d1c7;border-radius:12px;padding:1.1rem;margin-bottom:.9rem;transition:border-color .15s,background .15s}
.qcard.ok{border-color:#1d9e75;background:#eaf3de}
.qcard.fail{border-color:#e24b4a;background:#fcebeb}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.qbadge{font-size:11px;color:#888780;background:#f1efe8;padding:2px 7px;border-radius:5px}
.qmeta{display:flex;gap:5px;align-items:center}
.qpct{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.qnum{font-size:10px;color:#b4b2a9}
.qtext{font-size:14px;line-height:1.65;margin-bottom:.8rem;font-weight:600}
.opts{display:flex;flex-direction:column;gap:4px}
.opt{text-align:left;padding:9px 12px;border:1px solid #d3d1c7;border-radius:7px;background:#fff;cursor:pointer;font-size:13px;line-height:1.5;font-family:inherit}
.opt:hover:not(:disabled){background:#f1efe8}
.opt.c-ok{background:#eaf3de;border-color:#1d9e75;color:#0f6e56;font-weight:600}
.opt.c-fail{background:#fcebeb;border-color:#e24b4a;color:#a32d2d}
.exp{margin-top:.6rem;padding:8px 11px;background:#f1efe8;border-radius:7px;font-size:12px;color:#444441;line-height:1.6;border-left:3px solid #185fa5}
.empty{color:#888780;font-size:14px;padding:3rem;text-align:center;background:#fff;border-radius:12px;border:1px solid #d3d1c7}
.sep{font-size:12px;font-weight:600;color:#888780;margin:1.2rem 0 .4rem;padding-bottom:.3rem;border-bottom:1px solid #d3d1c7}
</style>
</head>

<div class="wrap">

<script>
const BANK=[{"u":1,"t":"El objeto de la LPAC, según su artículo 1, regula las relaciones de las Administraciones Públicas con los particulares y:","o":["Los principios del régimen jurídico de las Administraciones Públicas.","Los requisitos de validez y eficacia de los actos administrativos y el procedimiento administrativo común.","Únicamente el procedimiento sancionador y de responsabilidad patrimonial.","Las relaciones entre las distintas Administraciones Públicas entre sí."],"c":1,"e":"Art. 1 LPAC. Los requisitos de validez y eficacia de los actos administrativos y el procedimiento administrativo común."},{"u":1,"t":"¿Cuál de los siguientes NO tiene capacidad de obrar ante las Administraciones Públicas conforme al art. 3 LPAC?","o":["Las personas físicas mayores de edad.","Los menores de edad para el ejercicio y defensa de derechos e intereses cuya actuación esté permitida por el ordenamiento sin asistencia de la persona que ejerza la patria potestad.","Los grupos de afectados, uniones y entidades sin personalidad jurídica cuando la Ley así lo declare expresamente.","Un menor de edad incapacitado judicialmente para todos los actos, sin excepción alguna."],"c":3,"e":"Art. 3 LPAC. Un menor de edad incapacitado judicialmente para todos los actos, sin excepción alguna."},{"u":1,"t":"Según el art. 4 LPAC, se consideran interesados en el procedimiento administrativo:","o":["Solo quienes lo promuevan como titulares de derechos o intereses legítimos individuales o colectivos.","Quienes lo promuevan como titulares de derechos o intereses legítimos individuales o colectivos, quienes sin haberlo iniciado tengan derechos que puedan resultar afectados, y aquellos cuyos intereses legítimos puedan resultar afectados por la resolución y se personen antes de que se dicte.","Únicamente las personas físicas y jurídicas con domicilio en el territorio español.","Solo las personas que hayan sido notificadas expresamente del inicio del procedimiento."],"c":1,"e":"Art. 4 LPAC. Quienes lo promuevan como titulares de derechos o intereses legítimos individuales o colectivos, quienes sin haberlo iniciado tengan derechos que puedan resultar afectados, y aquellos cuyos intereses legítimos puedan resultar afectados por la resolución y se personen antes de que se dicte."},{"u":1,"t":"¿Para qué actos se exige representación acreditada conforme al art. 5 LPAC?","o":["Para formular solicitudes, presentar declaraciones responsables o comunicaciones, interponer recursos, desistir de acciones y renunciar a derechos en nombre de otra persona.","Para realizar cualquier acto en sede electrónica, sin excepción.","Únicamente para interponer recursos administrativos.","Solo cuando lo exija expresamente el órgano competente, sin previsión legal general."],"c":0,"e":"Art. 5 LPAC. Para formular solicitudes, presentar declaraciones responsables o comunicaciones, interponer recursos, desistir de acciones y renunciar a derechos en nombre de otra persona."},{"u":1,"t":"Los registros electrónicos de apoderamientos (art. 6 LPAC) deben recoger, como mínimo, además del poder otorgado por el interesado:","o":["Únicamente la identidad del apoderado.","La fecha de incorporación del poder al registro, su período de vigencia, y la identidad del poderdante y del apoderado.","Solo la identidad del poderdante y la fecha de otorgamiento ante notario.","El número de procedimientos en los que se ha usado el poder durante el último año."],"c":1,"e":"Art. 6 LPAC. La fecha de incorporación del poder al registro, su período de vigencia, y la identidad del poderdante y del apoderado."},{"u":1,"t":"Cuando en una solicitud, escrito o comunicación figuren varios interesados, las actuaciones se entenderán con:","o":["Todos ellos de forma simultánea e independiente.","El que se haya designado expresamente, o, en su defecto, con el que figure en primer término.","El de mayor edad entre los firmantes.","El órgano decide discrecionalmente con quién entenderse."],"c":1,"e":"Art. 7 LPAC. El que se haya designado expresamente, o, en su defecto, con el que figure en primer término."},{"u":1,"t":"Si durante la instrucción de un procedimiento que no haya tenido publicidad se advierte la existencia de personas que sean titulares de derechos o intereses legítimos y directos cuya identificación resulte del expediente, la Administración:","o":["No tiene obligación alguna respecto de ellas.","Comunicará a dichas personas la tramitación del procedimiento.","Debe archivar el procedimiento de oficio.","Solo debe actuar si esas personas lo solicitan expresamente."],"c":1,"e":"Art. 8 LPAC. Comunicará a dichas personas la tramitación del procedimiento."},{"u":1,"t":"El régimen de capacidad de obrar y representación de la LPAC se aplica:","o":["Solo a las personas físicas, nunca a las jurídicas.","A personas físicas y jurídicas, así como a entidades sin personalidad jurídica cuando la ley así lo declare expresamente.","Únicamente a los ciudadanos de nacionalidad española.","Solo a quienes ya tengan la condición de interesados reconocida por resolución expresa."],"c":1,"e":"Arts. 3-4 LPAC. A personas físicas y jurídicas, así como a entidades sin personalidad jurídica cuando la ley así lo declare expresamente."},{"u":1,"t":"Un interesado revoca la representación otorgada a su procurador a mitad de un procedimiento. ¿Qué efecto produce esta revocación en las actuaciones ya practicadas?","o":["Las actuaciones realizadas con el representante antes de la revocación se conservan, sin perjuicio de que la Administración deba dirigirse en lo sucesivo al interesado o a su nuevo representante.","Todo el procedimiento debe retrotraerse y repetirse desde el inicio.","El procedimiento queda automáticamente caducado.","La revocación no puede hacerse mientras el procedimiento esté en curso."],"c":0,"e":"Art. 5 LPAC. Las actuaciones realizadas con el representante antes de la revocación se conservan, sin perjuicio de que la Administración deba dirigirse en lo sucesivo al interesado o a su nuevo representante."},{"u":2,"t":"Conforme al art. 13 LPAC, las personas tienen derecho, en sus relaciones con las Administraciones Públicas, entre otros, a:","o":["Comunicarse exclusivamente por medios electrónicos en todo caso, sin excepción.","Ser asistidas en el uso de medios electrónicos, a la protección de datos de carácter personal, y a no presentar datos y documentos no exigidos por las normas aplicables o que ya estén en poder de la Administración actuante.","Recibir una indemnización automática por cualquier retraso en la tramitación.","Elegir libremente el órgano administrativo competente para resolver."],"c":1,"e":"Art. 13 LPAC. Ser asistidas en el uso de medios electrónicos, a la protección de datos de carácter personal, y a no presentar datos y documentos no exigidos por las normas aplicables o que ya estén en poder de la Administración actuante."},{"u":2,"t":"El art. 14 LPAC establece la obligación de relacionarse exclusivamente a través de medios electrónicos con las Administraciones Públicas, entre otros, para:","o":["Todas las personas físicas, sin excepción.","Las personas jurídicas, las entidades sin personalidad jurídica, quienes ejerzan una actividad profesional para la que se requiera colegiación obligatoria (para los trámites y actuaciones que realicen con las AAPP en ejercicio de dicha actividad profesional), y quienes representen a un interesado obligado a relacionarse electrónicamente.","Únicamente los funcionarios públicos en el ejercicio de su cargo.","Solo las personas físicas mayores de 65 años."],"c":1,"e":"Art. 14 LPAC. Las personas jurídicas, las entidades sin personalidad jurídica, quienes ejerzan una actividad profesional para la que se requiera colegiación obligatoria (para los trámites y actuaciones que realicen con las AAPP en ejercicio de dicha actividad profesional), y quienes representen a un interesado obligado a relacionarse electrónicamente."},{"u":2,"t":"Según el art. 16 LPAC, cada Administración dispondrá de un registro electrónico general (o, en su caso, varios registros electrónicos), en el que se hará el correspondiente asiento de todo documento que sea presentado o que se reciba en cualquier órgano administrativo. ¿Qué ocurre con un escrito presentado dentro de plazo en el registro de una Administración distinta de la competente?","o":["Se considera no presentado y se archiva sin más trámite.","Se considera presentado en la fecha de entrada en el registro de la Administración receptora, a todos los efectos, incluida la determinación del cumplimiento del plazo.","Se devuelve al interesado para que lo presente en el registro correcto, sin reconocer ningún efecto a la fecha de la presentación errónea.","Solo se admite si la Administración receptora pertenece al mismo nivel territorial."],"c":1,"e":"Art. 16 LPAC. Se considera presentado en la fecha de entrada en el registro de la Administración receptora, a todos los efectos, incluida la determinación del cumplimiento del plazo."},{"u":2,"t":"¿Cuál es el plazo máximo general para resolver un procedimiento cuando una norma reguladora no fija expresamente plazo, según la LPAC?","o":["Un mes.","Tres meses.","Seis meses.","Un año."],"c":1,"e":"Art. 21.3 LPAC. Tres meses."},{"u":2,"t":"La suspensión del plazo máximo para resolver (art. 22 LPAC) puede acordarse, entre otros supuestos, cuando:","o":["El órgano competente decida discrecionalmente suspenderlo sin causa alguna.","Deba requerirse a cualquier interesado para la subsanación de deficiencias o la aportación de documentos, por el tiempo que medie entre la notificación del requerimiento y su efectivo cumplimiento.","El interesado solicite verbalmente una prórroga sin presentar escrito alguno.","Haya transcurrido la mitad del plazo máximo de resolución, automáticamente."],"c":1,"e":"Art. 22 LPAC. Deba requerirse a cualquier interesado para la subsanación de deficiencias o la aportación de documentos, por el tiempo que medie entre la notificación del requerimiento y su efectivo cumplimiento."},{"u":2,"t":"El plazo máximo para resolver un procedimiento puede ampliarse, excepcionalmente, mediante motivación clara de las circunstancias concurrentes, por un plazo:","o":["Igual al establecido para la tramitación del procedimiento, con el límite de la mitad del mismo.","Ilimitado, mientras subsistan las circunstancias.","De un año en todo caso.","Que nunca podrá exceder de un mes, independientemente del plazo original."],"c":0,"e":"Art. 23 LPAC. Igual al establecido para la tramitación del procedimiento, con el límite de la mitad del mismo."},{"u":2,"t":"En los procedimientos iniciados a solicitud del interesado, el silencio administrativo, salvo norma con rango de ley o de Derecho de la Unión Europea que establezca lo contrario, tendrá efecto:","o":["Siempre desestimatorio.","Estimatorio (silencio positivo), como regla general.","Estimatorio solo en materia de medio ambiente.","Nulo de pleno derecho."],"c":1,"e":"Art. 24 LPAC. Estimatorio (silencio positivo), como regla general."},{"u":2,"t":"¿En cuáles de los siguientes casos el silencio administrativo en procedimientos iniciados a solicitud del interesado tiene, por excepción, carácter desestimatorio?","o":["En ningún caso; siempre es estimatorio.","En los procedimientos relativos al ejercicio del derecho de petición, aquellos cuya estimación tuviera como consecuencia que se transfirieran al solicitante o a terceros facultades relativas al dominio público o al servicio público, y los de impugnación de actos y disposiciones (con la salvedad del recurso de alzada contra desestimación por silencio).","Solo en los procedimientos tributarios.","Solo cuando lo solicite expresamente la Administración."],"c":1,"e":"Art. 24.1 LPAC. En los procedimientos relativos al ejercicio del derecho de petición, aquellos cuya estimación tuviera como consecuencia que se transfirieran al solicitante o a terceros facultades relativas al dominio público o al servicio público, y los de impugnación de actos y disposiciones (con la salvedad del recurso de alzada contra desestimación por silencio)."},{"u":2,"t":"En los procedimientos iniciados de oficio, el vencimiento del plazo máximo sin haberse dictado y notificado resolución expresa produce, en los procedimientos de los que pudiera derivarse el reconocimiento o constitución de derechos u otras situaciones jurídicas individualizadas:","o":["Estimación de lo pedido, en todo caso.","La caducidad del procedimiento, en todo caso.","La declaración de caducidad por el órgano competente, salvo que se trate de procedimientos en que la Administración ejercite potestades sancionadoras o de intervención, susceptibles de producir efectos desfavorables o de gravamen, en los que se entenderá producido el silencio negativo.","Su archivo automático sin posibilidad de iniciar uno nuevo."],"c":2,"e":"Art. 25 LPAC. La declaración de caducidad por el órgano competente, salvo que se trate de procedimientos en que la Administración ejercite potestades sancionadoras o de intervención, susceptibles de producir efectos desfavorables o de gravamen, en los que se entenderá producido el silencio negativo."},{"u":2,"t":"¿Cómo se computan los plazos señalados por días, salvo que por Ley o en el Derecho de la Unión Europea se disponga otra cosa?","o":["En días naturales siempre.","Se entiende que los días son hábiles, excluyéndose del cómputo los sábados, domingos y los declarados festivos.","Solo en días laborables de jornada completa.","Se computan exclusivamente de lunes a jueves."],"c":1,"e":"Art. 30 LPAC. Se entiende que los días son hábiles, excluyéndose del cómputo los sábados, domingos y los declarados festivos."},{"u":2,"t":"Cuando el último día del plazo sea inhábil, se entenderá prorrogado:","o":["Al primer día hábil siguiente.","Al día hábil anterior.","El plazo se extingue sin posibilidad de prórroga.","Se prorroga automáticamente una semana completa."],"c":0,"e":"Art. 30 LPAC. Al primer día hábil siguiente."},{"u":2,"t":"El registro electrónico de cada Administración u Organismo se rige, a efectos de cómputo de plazos, por la fecha y hora oficial de:","o":["La sede del interesado que presenta el documento.","La sede electrónica de acceso, que deberá contar con un sistema que garantice la constancia de la fecha y hora oficial.","El huso horario de Canarias, en todo caso.","El reloj del dispositivo del interesado al presentar el escrito."],"c":1,"e":"Art. 31 LPAC. La sede electrónica de acceso, que deberá contar con un sistema que garantice la constancia de la fecha y hora oficial."},{"u":2,"t":"El funcionamiento electrónico del sector público garantiza, entre otros aspectos, la disponibilidad, integridad, autenticidad, confidencialidad, calidad, trazabilidad y conservación de los datos, informaciones y servicios que gestione en el ejercicio de sus competencias, conforme a lo establecido en:","o":["Solo el Reglamento Europeo de Protección de Datos.","La normativa de Esquema Nacional de Seguridad y demás normativa aplicable.","Exclusivamente las normas internas de cada Administración.","Ninguna normativa específica; queda a discreción de cada órgano."],"c":1,"e":"Art. 26 LPAC. La normativa de Esquema Nacional de Seguridad y demás normativa aplicable."},{"u":2,"t":"Las copias realizadas por las Administraciones Públicas, utilizando medios electrónicos, de los documentos originales emitidos por el interesado o por la propia Administración tendrán:","o":["Nunca la misma validez y eficacia que el documento original.","La misma validez y eficacia que los documentos originales, siempre que se reúnan ciertas garantías (incorporación de metadatos, firma electrónica, etc.).","Validez solo si están notarialmente protocolizadas.","Validez solo a efectos internos de la Administración, no frente a terceros."],"c":1,"e":"Art. 27 LPAC. La misma validez y eficacia que los documentos originales, siempre que se reúnan ciertas garantías (incorporación de metadatos, firma electrónica, etc.)."},{"u":2,"t":"Como regla general, los interesados NO estarán obligados a aportar documentos que:","o":["Hayan sido elaborados por cualquier Administración Pública, con independencia de cuál sea su naturaleza.","Hayan sido elaborados por cualquier Administración con independencia de que la presentación de los mismos tenga carácter preceptivo o facultativo, siempre que el interesado haya expresado su consentimiento a que sean consultados o recabados (salvo oposición expresa o que la ley especial aplicable requiera consentimiento expreso), y que ya se encuentren en poder de la Administración actuante o hayan sido elaborados por cualquier otra Administración.","Solo los documentos que tengan más de un año de antigüedad.","Únicamente los documentos emitidos por la propia Administración actuante en el mismo procedimiento."],"c":1,"e":"Art. 28 LPAC. Hayan sido elaborados por cualquier Administración con independencia de que la presentación de los mismos tenga carácter preceptivo o facultativo, siempre que el interesado haya expresado su consentimiento a que sean consultados o recabados (salvo oposición expresa o que la ley especial aplicable requiera consentimiento expreso), y que ya se encuentren en poder de la Administración actuante o hayan sido elaborados por cualquier otra Administración."},{"u":3,"t":"Los actos administrativos que dicten las Administraciones Públicas, ya sean de forma escrita o verbal, conforme al art. 34 LPAC:","o":["Se producirán por el órgano competente ajustándose al procedimiento establecido.","Pueden dictarse por cualquier funcionario, con independencia de su competencia.","No requieren procedimiento alguno si son de mero trámite.","Solo pueden producirse de forma escrita."],"c":0,"e":"Art. 34 LPAC. Se producirán por el órgano competente ajustándose al procedimiento establecido."},{"u":3,"t":"¿Cuáles de los siguientes actos administrativos deben ser motivados, con sucinta referencia de hechos y fundamentos de derecho?","o":["Únicamente los actos sancionadores.","Entre otros, los que limiten derechos subjetivos o intereses legítimos, los que resuelvan procedimientos de revisión de oficio, recursos administrativos, reclamaciones previas a la vía judicial y procedimientos de arbitraje, y los que se separen del criterio seguido en actuaciones precedentes o del dictamen de órganos consultivos.","Solo los actos de las Administraciones autonómicas, no los del Estado.","Ningún acto administrativo requiere motivación si así lo decide el órgano."],"c":1,"e":"Art. 35 LPAC. Entre otros, los que limiten derechos subjetivos o intereses legítimos, los que resuelvan procedimientos de revisión de oficio, recursos administrativos, reclamaciones previas a la vía judicial y procedimientos de arbitraje, y los que se separen del criterio seguido en actuaciones precedentes o del dictamen de órganos consultivos."},{"u":3,"t":"Como regla general, los actos administrativos producen efectos desde la fecha en que se dicten, salvo que en ellos se disponga otra cosa. La eficacia quedará demorada cuando así lo exija:","o":["El contenido del acto o esté supeditada a su notificación, publicación o aprobación superior.","Únicamente la voluntad discrecional del órgano emisor, sin causa objetiva.","Solo cuando el acto sea sancionador.","Nunca puede demorarse la eficacia de un acto administrativo."],"c":0,"e":"Art. 39 LPAC. El contenido del acto o esté supeditada a su notificación, publicación o aprobación superior."},{"u":3,"t":"Conforme al art. 40 LPAC, toda resolución y acto administrativo que afecte a derechos e intereses de los interesados deberá ser:","o":["Solo archivado en el expediente, sin más trámite.","Notificado a los interesados cuya situación jurídica resulte afectada, en los términos previstos en la ley.","Publicado obligatoriamente en el BOE, sin excepción.","Comunicado verbalmente, siendo suficiente esta forma en todos los casos."],"c":1,"e":"Art. 40 LPAC. Notificado a los interesados cuya situación jurídica resulte afectada, en los términos previstos en la ley."},{"u":3,"t":"Toda notificación deberá ser cursada dentro del plazo de diez días a partir de la fecha en que el acto haya sido dictado, y deberá contener:","o":["Solo el texto íntegro de la resolución.","El texto íntegro de la resolución, con indicación de si es o no definitivo en la vía administrativa, la expresión de los recursos que procedan, en su caso, en vía administrativa y judicial, el órgano ante el que hubieran de presentarse y el plazo para interponerlos.","Únicamente el nombre del órgano que dictó el acto.","Solo la fecha de notificación, sin más contenido."],"c":1,"e":"Art. 40 LPAC. El texto íntegro de la resolución, con indicación de si es o no definitivo en la vía administrativa, la expresión de los recursos que procedan, en su caso, en vía administrativa y judicial, el órgano ante el que hubieran de presentarse y el plazo para interponerlos."},{"u":3,"t":"Surtirán efecto las notificaciones que, conteniendo el texto íntegro del acto, omitiesen otros requisitos (como la indicación de recursos), si:","o":["Nunca surten efecto, deben repetirse necesariamente.","El interesado realizara cualquier actuación que suponga el conocimiento del contenido y alcance de la resolución o acto objeto de la notificación, o interpusiera cualquier recurso procedente.","El órgano administrativo lo decide unilateralmente.","Han transcurrido seis meses desde la notificación defectuosa."],"c":1,"e":"Art. 40.3 LPAC. El interesado realizara cualquier actuación que suponga el conocimiento del contenido y alcance de la resolución o acto objeto de la notificación, o interpusiera cualquier recurso procedente."},{"u":3,"t":"Cuando no fuera posible realizar la notificación de acuerdo con lo establecido en el artículo sobre notificación electrónica, y tras intentarla, las Administraciones Públicas podrán practicarla por medios no electrónicos en los siguientes supuestos, entre otros:","o":["Cuando la notificación se realice con ocasión de la comparecencia espontánea del interesado o su representante en las oficinas de asistencia en materia de registro y solicite la comunicación o notificación personal en ese momento.","Siempre, sin necesidad de justificación alguna.","Solo si lo autoriza expresamente un juez.","Únicamente cuando el interesado sea una persona jurídica."],"c":0,"e":"Art. 41 LPAC. Cuando la notificación se realice con ocasión de la comparecencia espontánea del interesado o su representante en las oficinas de asistencia en materia de registro y solicite la comunicación o notificación personal en ese momento."},{"u":3,"t":"En las notificaciones en papel, cuando la notificación se practique en el domicilio del interesado, de no hallarse presente este en el momento de entregarse, podrá hacerse cargo:","o":["Únicamente el propio interesado, en ningún caso otra persona.","Cualquier persona mayor de catorce años que se encuentre en el domicilio y haga constar su identidad.","Solo un familiar directo mayor de edad.","Nadie; debe repetirse el intento indefinidamente."],"c":1,"e":"Art. 42 LPAC. Cualquier persona mayor de catorce años que se encuentre en el domicilio y haga constar su identidad."},{"u":3,"t":"En las notificaciones por medios electrónicos, cuando exista constancia de la puesta a disposición de la notificación en la sede electrónica o dirección electrónica habilitada, se entenderá rechazada cuando:","o":["Hayan transcurrido diez días naturales desde la puesta a disposición sin que se acceda a su contenido.","Hayan transcurrido diez días naturales sin que el interesado acceda a su contenido, siempre que se acredite que estaba obligado a recibirla por esta vía o la hubiera elegido expresamente.","El interesado lo manifieste expresamente por escrito.","Hayan transcurrido seis meses naturales."],"c":1,"e":"Art. 43 LPAC. Hayan transcurrido diez días naturales sin que el interesado acceda a su contenido, siempre que se acredite que estaba obligado a recibirla por esta vía o la hubiera elegido expresamente."},{"u":3,"t":"Cuando los interesados en un procedimiento sean desconocidos, se ignore el lugar de la notificación, o intentada la notificación no se hubiese podido practicar, ¿cómo se realiza la notificación?","o":["Mediante un anuncio publicado en el BOE.","Mediante anuncio en el tablón del Ayuntamiento del último domicilio conocido, exclusivamente.","Sin posibilidad de notificación, se archiva el expediente.","Solo mediante telegrama certificado."],"c":0,"e":"Art. 44 LPAC. Mediante un anuncio publicado en el BOE."},{"u":3,"t":"Los actos administrativos serán objeto de publicación cuando así lo establezcan las normas reguladoras de cada procedimiento o cuando:","o":["Lo decida discrecionalmente la Administración, sin más requisitos.","Así lo aconsejen razones de interés público apreciadas por el órgano competente, o tenga por destinatarios una pluralidad indeterminada de personas, o cuando el acto carezca de destinatario.","Únicamente en el caso de sanciones económicas superiores a determinada cuantía.","Nunca; los actos administrativos solo se notifican, no se publican."],"c":1,"e":"Art. 45 LPAC. Así lo aconsejen razones de interés público apreciadas por el órgano competente, o tenga por destinatarios una pluralidad indeterminada de personas, o cuando el acto carezca de destinatario."},{"u":4,"t":"¿Cuál de los siguientes NO es un acto administrativo nulo de pleno derecho conforme al art. 47 LPAC?","o":["Los que lesionen los derechos y libertades susceptibles de amparo constitucional.","Los dictados por órgano manifiestamente incompetente por razón de la materia o del territorio.","Los dictados prescindiendo total y absolutamente del procedimiento legalmente establecido.","Los que incurran en cualquier infracción del ordenamiento jurídico, incluso la desviación de poder."],"c":3,"e":"Arts. 47-48 LPAC. Los que incurran en cualquier infracción del ordenamiento jurídico, incluso la desviación de poder."},{"u":4,"t":"Son nulos de pleno derecho los actos administrativos dictados:","o":["Como consecuencia de la resolución de recursos por el órgano competente para ello.","Prescindiendo total y absolutamente de las normas que contienen las reglas esenciales para la formación de la voluntad de los órganos colegiados.","Cuando se hayan dictado fuera de plazo, sin más.","Cuando exista un error material o de hecho."],"c":1,"e":"Art. 47.1.e) LPAC. Prescindiendo total y absolutamente de las normas que contienen las reglas esenciales para la formación de la voluntad de los órganos colegiados."},{"u":4,"t":"Conforme al art. 48 LPAC, son anulables los actos de la Administración que:","o":["Incurran en cualquier infracción del ordenamiento jurídico, incluso la desviación de poder, lesionen derechos fundamentales susceptibles de amparo, o sean dictados con ausencia total de procedimiento.","Incurran en cualquier infracción del ordenamiento jurídico, incluso la desviación de poder.","Sean dictados por órgano manifiestamente incompetente por razón de la materia.","Tengan un contenido imposible."],"c":1,"e":"Art. 48 LPAC. Incurran en cualquier infracción del ordenamiento jurídico, incluso la desviación de poder."},{"u":4,"t":"El defecto de forma solo determinará la anulabilidad cuando:","o":["Afecte siempre, sin excepción, a la validez del acto.","El acto carezca de los requisitos formales indispensables para alcanzar su fin o dé lugar a la indefensión de los interesados.","El acto haya sido recurrido en plazo.","Lo decida discrecionalmente el órgano superior jerárquico."],"c":1,"e":"Art. 48.2 LPAC. El acto carezca de los requisitos formales indispensables para alcanzar su fin o dé lugar a la indefensión de los interesados."},{"u":4,"t":"La nulidad o anulabilidad de un acto no implicará la de los sucesivos en el procedimiento que sean independientes del primero, conforme al principio de:","o":["Conservación de actos y trámites.","Conversión de actos viciados.","Convalidación.","Transmisibilidad."],"c":0,"e":"Art. 51 LPAC. Conservación de actos y trámites."},{"u":4,"t":"La Administración podrá convalidar los actos anulables, subsanando los vicios de que adolezcan. El acto de convalidación produce efecto:","o":["Retroactivo, desde la fecha del acto convalidado.","Desde su fecha, salvo lo dispuesto para la retroactividad de los actos administrativos.","Solo si lo autoriza expresamente un juez.","La convalidación nunca es posible en Derecho Administrativo español."],"c":1,"e":"Art. 52 LPAC. Desde su fecha, salvo lo dispuesto para la retroactividad de los actos administrativos."},{"u":4,"t":"Los derechos y obligaciones transmisibles establecidos en un acto administrativo se transmitirán a los causahabientes, según el art. 50 LPAC:","o":["Solo si el acto administrativo lo prevé expresamente, en todo caso.","Salvo que el contenido del acto o su naturaleza lo impidiesen.","Nunca, los actos administrativos son siempre personalísimos e intransmisibles.","Solo en caso de fallecimiento del titular, no en caso de transmisión voluntaria."],"c":1,"e":"Art. 50 LPAC. Salvo que el contenido del acto o su naturaleza lo impidiesen."},{"u":5,"t":"Entre los derechos del interesado en el procedimiento administrativo (art. 53 LPAC) se encuentra el de:","o":["Conocer, en cualquier momento, el estado de la tramitación de los procedimientos en los que tenga la condición de interesado y obtener copias de documentos contenidos en ellos.","Exigir que la Administración resuelva siempre a su favor.","Solicitar la sustitución del funcionario instructor sin causa justificada.","Recurrir directamente ante el Tribunal Constitucional cualquier acto de trámite."],"c":0,"e":"Art. 53 LPAC. Conocer, en cualquier momento, el estado de la tramitación de los procedimientos en los que tenga la condición de interesado y obtener copias de documentos contenidos en ellos."},{"u":5,"t":"Los procedimientos administrativos podrán iniciarse:","o":["Solo de oficio.","Solo a solicitud del interesado.","De oficio o a solicitud del interesado.","Únicamente por mandato judicial."],"c":2,"e":"Art. 54 LPAC. De oficio o a solicitud del interesado."},{"u":5,"t":"Antes del inicio del procedimiento, el órgano competente podrá abrir un período de información o actuaciones previas con el fin de:","o":["Dictar directamente resolución sin más trámite.","Conocer las circunstancias del caso concreto y la conveniencia o no de iniciar el procedimiento.","Notificar a todos los posibles interesados antes de cualquier otra actuación.","Sustituir el trámite de audiencia posterior."],"c":1,"e":"Art. 55 LPAC. Conocer las circunstancias del caso concreto y la conveniencia o no de iniciar el procedimiento."},{"u":5,"t":"Iniciado el procedimiento, el órgano competente podrá adoptar las medidas provisionales que estime oportunas para asegurar la eficacia de la resolución que pudiera recaer, si existiesen elementos de juicio suficientes para ello. ¿Pueden adoptarse medidas provisionales antes de la iniciación?","o":["No, en ningún caso.","Sí, en los casos de urgencia y para la protección provisional de los intereses implicados, siempre que se confirmen, modifiquen o levanten en el acuerdo de iniciación del procedimiento, que deberá efectuarse dentro de los quince días siguientes a su adopción.","Sí, pero solo si lo autoriza un juez.","Solo en procedimientos sancionadores, nunca en otros."],"c":1,"e":"Art. 56 LPAC. Sí, en los casos de urgencia y para la protección provisional de los intereses implicados, siempre que se confirmen, modifiquen o levanten en el acuerdo de iniciación del procedimiento, que deberá efectuarse dentro de los quince días siguientes a su adopción."},{"u":5,"t":"Cuando las solicitudes de iniciación no reúnan los requisitos exigidos, se requerirá al interesado para que subsane la falta o acompañe los documentos preceptivos, con indicación de que, si así no lo hiciera, se le tendrá por desistido de su petición, en un plazo de:","o":["Tres días hábiles.","Cinco días hábiles.","Diez días hábiles.","Un mes."],"c":2,"e":"Art. 68 LPAC. Diez días hábiles."},{"u":5,"t":"El órgano administrativo que inicie o tramite un procedimiento, cualquiera que haya sido la forma de su iniciación, podrá disponer su acumulación a otros con los que guarde identidad sustancial o íntima conexión, mediante:","o":["Una resolución específicamente recurrible.","Acuerdo no susceptible de recurso.","Sentencia judicial.","Dictamen preceptivo del Consejo de Estado."],"c":1,"e":"Art. 57 LPAC. Acuerdo no susceptible de recurso."},{"u":5,"t":"Las declaraciones responsables y las comunicaciones presentadas por los interesados producirán los efectos que se determinen en cada caso por la legislación correspondiente y permitirán, con carácter general:","o":["El reconocimiento o ejercicio de un derecho o el inicio de una actividad, desde el día de su presentación, sin perjuicio de las facultades de comprobación, control e inspección que tengan atribuidas las Administraciones Públicas.","Que la Administración deba dictar resolución expresa antes de poder ejercer la actividad.","El inicio de la actividad solo tras un plazo de espera de seis meses.","El inicio de la actividad únicamente si se obtiene silencio administrativo positivo previo."],"c":0,"e":"Art. 69 LPAC. El reconocimiento o ejercicio de un derecho o el inicio de una actividad, desde el día de su presentación, sin perjuicio de las facultades de comprobación, control e inspección que tengan atribuidas las Administraciones Públicas."},{"u":5,"t":"Las solicitudes de iniciación que se formulen deberán contener, entre otros extremos, conforme al art. 66 LPAC:","o":["Solo el nombre del solicitante, sin más datos.","Nombre y apellidos del interesado y, en su caso, de la persona que lo represente, identificación del medio electrónico o lugar para notificaciones, hechos, razones y petición, lugar y fecha, firma del solicitante, y órgano al que se dirige.","Únicamente la firma del solicitante, siendo el resto de datos opcionales.","El número de expediente, que debe conocer previamente el interesado."],"c":1,"e":"Art. 66 LPAC. Nombre y apellidos del interesado y, en su caso, de la persona que lo represente, identificación del medio electrónico o lugar para notificaciones, hechos, razones y petición, lugar y fecha, firma del solicitante, y órgano al que se dirige."},{"u":5,"t":"Cuando una solicitud no se dirija al órgano competente, este remitirá la solicitud al órgano competente, si lo conociese, e informará de esta circunstancia al interesado. Este reenvío:","o":["No exime a la Administración receptora de ningún efecto sobre el cómputo del plazo.","Determina que la fecha de presentación inicial se mantenga a efectos del cómputo del plazo para resolver y notificar (la presentación se entiende hecha, a estos efectos, en la fecha en que tuvo entrada en el registro de la Administración incompetente).","Implica que el procedimiento decae automáticamente.","Obliga a iniciar el procedimiento desde cero a todos los efectos, incluido el plazo."],"c":1,"e":"Art. 16 y conexión con iniciación, LPAC. Determina que la fecha de presentación inicial se mantenga a efectos del cómputo del plazo para resolver y notificar (la presentación se entiende hecha, a estos efectos, en la fecha en que tuvo entrada en el registro de la Administración incompetente)."},{"u":5,"t":"¿Qué efectos produce, con carácter general, la presentación de una solicitud, escrito o comunicación en cualquier registro electrónico de una Administración, Organismo público o Entidad, respecto del cómputo de los plazos que hayan de cumplir las Administraciones Públicas?","o":["Ninguno, deben repetirse los actos en el registro propio del órgano destinatario.","Obliga a estas a dar el correspondiente recibo, en el que conste la fecha y hora de presentación, considerándose, a los efectos del cómputo de plazos, como fecha de entrada la fecha y hora de presentación en el registro electrónico de la Administración u Organismo competente.","Solo produce efectos si se presenta en horario de oficina.","Solo es válida si se presenta presencialmente, no electrónicamente."],"c":1,"e":"Art. 16 LPAC. Obliga a estas a dar el correspondiente recibo, en el que conste la fecha y hora de presentación, considerándose, a los efectos del cómputo de plazos, como fecha de entrada la fecha y hora de presentación en el registro electrónico de la Administración u Organismo competente."},{"u":5,"t":"El expediente administrativo, conforme al art. 70 LPAC, es el conjunto ordenado de documentos y actuaciones que sirven de antecedente y fundamento a la resolución administrativa, así como las diligencias encaminadas a ejecutarla. ¿Qué documentos NO formarán parte del expediente administrativo?","o":["Las propuestas e informes internos que no constituyan trámites preceptivos ni se incorporen formalmente como parte de la resolución.","Las notas, borradores, opiniones, resúmenes, comunicaciones e informes internos o entre órganos o entidades administrativas, así como los juicios de valor emitidos por las Administraciones Públicas, salvo que se trate de informes preceptivos y vinculantes.","Las solicitudes presentadas por los interesados.","Las notificaciones cursadas a los interesados."],"c":1,"e":"Art. 70 LPAC. Las notas, borradores, opiniones, resúmenes, comunicaciones e informes internos o entre órganos o entidades administrativas, así como los juicios de valor emitidos por las Administraciones Públicas, salvo que se trate de informes preceptivos y vinculantes."},{"u":5,"t":"El procedimiento se impulsará, conforme al art. 71 LPAC, de oficio en todos sus trámites, y en aquellos en que deba solicitarse informe o dictamen, salvo disposición expresa en contrario, estos:","o":["No tendrán carácter preceptivo y, salvo precepto expreso en contrario, no serán vinculantes.","Siempre serán vinculantes y preceptivos.","Solo serán necesarios si los solicita el interesado.","Equivaldrán automáticamente a la resolución final."],"c":0,"e":"Arts. 71 y 80 LPAC. No tendrán carácter preceptivo y, salvo precepto expreso en contrario, no serán vinculantes."},{"u":5,"t":"El órgano que tramite el procedimiento podrá acordar de oficio o a instancia de parte que el desarrollo del procedimiento se realice de la forma más sencilla y eficaz posible, mediante la reducción de trámites, su realización conjunta o la concreción de los plazos y términos. Esto se conoce como el principio de:","o":["Celeridad y concreción de plazos y trámites.","Reformatio in peius.","Subsidiariedad.","Tipicidad."],"c":0,"e":"Art. 72 LPAC. Celeridad y concreción de plazos y trámites."},{"u":6,"t":"Los actos de instrucción necesarios para la determinación, conocimiento y comprobación de los datos en virtud de los cuales deba pronunciarse la resolución se realizarán:","o":["De oficio por el órgano que tramite el procedimiento, sin perjuicio del derecho de los interesados a proponer aquellas actuaciones que requieran su intervención o constituyan trámites legal o reglamentariamente establecidos.","Únicamente a instancia de los interesados.","Solo si lo ordena un juez.","Solo en procedimientos sancionadores."],"c":0,"e":"Art. 75 LPAC. De oficio por el órgano que tramite el procedimiento, sin perjuicio del derecho de los interesados a proponer aquellas actuaciones que requieran su intervención o constituyan trámites legal o reglamentariamente establecidos."},{"u":6,"t":"Los interesados, en cualquier momento del procedimiento anterior al trámite de audiencia, podrán:","o":["Aducir alegaciones y aportar documentos u otros elementos de juicio, que serán tenidos en cuenta por el órgano competente al redactar la propuesta de resolución.","Solo presentar alegaciones por escrito y nunca verbalmente.","Únicamente recurrir directamente ante los tribunales.","Solicitar la paralización indefinida del procedimiento."],"c":0,"e":"Art. 76 LPAC. Aducir alegaciones y aportar documentos u otros elementos de juicio, que serán tenidos en cuenta por el órgano competente al redactar la propuesta de resolución."},{"u":6,"t":"Los hechos relevantes para la decisión de un procedimiento podrán acreditarse por cualquier medio de prueba admisible en Derecho. Cuando la Administración no tenga por ciertos los hechos alegados por los interesados o la naturaleza del procedimiento lo exija, el instructor acordará la apertura de un período de prueba por un plazo:","o":["No superior a diez días ni inferior a tres.","No superior a treinta días ni inferior a diez.","Fijo de quince días en todo caso.","Que decide libremente el interesado."],"c":1,"e":"Art. 77 LPAC. No superior a treinta días ni inferior a diez."},{"u":6,"t":"Los informes serán facultativos y no vinculantes, salvo disposición expresa en contrario. Salvo disposición expresa en contrario, los informes se evacuarán en el plazo de:","o":["Cinco días.","Diez días.","Un mes.","Tres meses."],"c":1,"e":"Art. 80 LPAC. Diez días."},{"u":6,"t":"A efectos de la resolución del procedimiento, se solicitarán aquellos informes que sean preceptivos por las disposiciones legales, y los que se juzguen necesarios para resolver, citándose el precepto que los exija o fundamentando, en su caso, la conveniencia de reclamarlos. ¿Qué carácter tienen, salvo disposición expresa en contrario, los informes preceptivos?","o":["Vinculantes en todo caso.","No vinculantes, salvo disposición expresa en contrario.","Equivalentes a una resolución definitiva.","Carecen de valor jurídico alguno."],"c":1,"e":"Art. 80 LPAC. No vinculantes, salvo disposición expresa en contrario."},{"u":6,"t":"El trámite de audiencia (art. 82 LPAC) se sustancia poniendo de manifiesto a los interesados el expediente, o, en su caso, la propuesta de resolución, para que en un plazo:","o":["No inferior a diez días ni superior a quince puedan alegar y presentar los documentos y justificaciones que estimen pertinentes.","Fijo de un mes, sin posibilidad de reducción.","No superior a tres días.","Indeterminado, a discreción del órgano."],"c":0,"e":"Art. 82 LPAC. No inferior a diez días ni superior a quince puedan alegar y presentar los documentos y justificaciones que estimen pertinentes."},{"u":6,"t":"Se podrá prescindir del trámite de audiencia cuando:","o":["El interesado lo solicite expresamente por escrito.","No figuren en el procedimiento ni sean tenidos en cuenta en la resolución otros hechos ni otras alegaciones y pruebas que las aducidas por el interesado.","El procedimiento dure más de seis meses.","El órgano competente para resolver así lo decida sin necesidad de motivación."],"c":1,"e":"Art. 82.4 LPAC. No figuren en el procedimiento ni sean tenidos en cuenta en la resolución otros hechos ni otras alegaciones y pruebas que las aducidas por el interesado."},{"u":6,"t":"El trámite de información pública (art. 83 LPAC) se anunciará en el diario oficial correspondiente, a fin de que cualquier persona física o jurídica pueda examinar el procedimiento. El plazo para formular alegaciones, en todo caso, no podrá ser inferior a:","o":["Diez días.","Veinte días.","Un mes.","Tres meses."],"c":1,"e":"Art. 83 LPAC. Veinte días."},{"u":6,"t":"La incomparecencia en el trámite de información pública no impedirá a los interesados:","o":["Interponer los recursos procedentes contra la resolución definitiva del procedimiento.","Tener la condición de interesado en el procedimiento.","Solicitar la nulidad del procedimiento por este motivo.","Recurrir en vía judicial sin haber agotado la vía administrativa."],"c":0,"e":"Art. 83.3 LPAC. Interponer los recursos procedentes contra la resolución definitiva del procedimiento."},{"u":6,"t":"¿Qué órgano es competente, con carácter general, para resolver los procedimientos tramitados con simplificación de plazos por razones de interés público o de los procedimientos cuya tramitación se acuerde de urgencia?","o":["El mismo órgano que tendría competencia en tramitación ordinaria, reduciéndose a la mitad los plazos establecidos para el procedimiento ordinario, salvo los relativos a la presentación de solicitudes y recursos.","Un órgano especial creado al efecto en cada caso.","Necesariamente el superior jerárquico del órgano ordinario.","El Consejo de Ministros, en todo caso."],"c":0,"e":"Art. 33 LPAC. El mismo órgano que tendría competencia en tramitación ordinaria, reduciéndose a la mitad los plazos establecidos para el procedimiento ordinario, salvo los relativos a la presentación de solicitudes y recursos."},{"u":7,"t":"Conforme al art. 84 LPAC, pondrán fin al procedimiento la resolución, el desistimiento, la renuncia al derecho en que se funde la solicitud (cuando tal renuncia no esté prohibida por el ordenamiento jurídico), la declaración de caducidad, y:","o":["La imposibilidad material de continuarlo por causas sobrevenidas, así como la terminación convencional.","Únicamente el transcurso de un año desde su inicio.","La simple inactividad del interesado durante quince días.","El cambio de Gobierno."],"c":0,"e":"Art. 84 LPAC. La imposibilidad material de continuarlo por causas sobrevenidas, así como la terminación convencional."},{"u":7,"t":"Todo interesado podrá desistir de su solicitud o, cuando ello no esté prohibido por el ordenamiento jurídico, renunciar a sus derechos. Si el escrito de iniciación se hubiera formulado por dos o más interesados, el desistimiento o la renuncia:","o":["Afectará automáticamente a todos los interesados.","Solo afectará a aquellos que la hubiesen formulado.","Es siempre nulo si no lo suscriben todos los interesados.","Requiere autorización judicial previa en todo caso."],"c":1,"e":"Art. 93 LPAC. Solo afectará a aquellos que la hubiesen formulado."},{"u":7,"t":"La Administración podrá desistir motivadamente de los procedimientos iniciados de oficio en los supuestos y con los requisitos previstos en las leyes. ¿Es necesaria forma específica?","o":["No, basta cualquier manifestación verbal del órgano.","Sí, debe acordarse mediante resolución que deberá ser notificada a los interesados.","Solo si lo autoriza un dictamen del Consejo de Estado.","Nunca puede la Administración desistir de un procedimiento iniciado de oficio."],"c":1,"e":"Art. 93 LPAC. Sí, debe acordarse mediante resolución que deberá ser notificada a los interesados."},{"u":7,"t":"En los procedimientos iniciados a solicitud del interesado, cuando se produzca su paralización por causa imputable al mismo, la Administración le advertirá que, transcurridos tres meses, se producirá la caducidad del procedimiento. Consumido este plazo sin que el particular requerido realice las actividades necesarias para reanudar la tramitación:","o":["La Administración acordará el archivo de las actuaciones, notificándoselo al interesado.","El procedimiento continúa de oficio obligatoriamente.","Se entiende automáticamente estimada la solicitud.","Se traslada el expediente a vía judicial de oficio."],"c":0,"e":"Art. 95 LPAC. La Administración acordará el archivo de las actuaciones, notificándoselo al interesado."},{"u":7,"t":"La caducidad no producirá por sí sola la prescripción de las acciones del particular o de la Administración, pero:","o":["Los procedimientos caducados no interrumpirán el plazo de prescripción.","Sí produce siempre la prescripción de las acciones, sin excepción.","Impide volver a iniciar un nuevo procedimiento sobre el mismo objeto.","Equivale a una resolución de fondo desestimatoria."],"c":0,"e":"Art. 95 LPAC. Los procedimientos caducados no interrumpirán el plazo de prescripción."},{"u":7,"t":"La resolución que pone fin al procedimiento decidirá todas las cuestiones planteadas por los interesados y aquellas otras derivadas del mismo. Cuando se trate de cuestiones conexas que no hubieran sido planteadas por los interesados, el órgano competente:","o":["No puede pronunciarse sobre ellas en ningún caso.","Podrá pronunciarse sobre las mismas, poniéndolo antes de manifiesto a aquéllos por un plazo no superior a quince días, para que formulen las alegaciones que estimen pertinentes y aporten, en su caso, los medios de prueba.","Debe iniciar un procedimiento totalmente nuevo.","Las resuelve directamente sin dar audiencia, por ser cuestiones conexas."],"c":1,"e":"Art. 88 LPAC. Podrá pronunciarse sobre las mismas, poniéndolo antes de manifiesto a aquéllos por un plazo no superior a quince días, para que formulen las alegaciones que estimen pertinentes y aporten, en su caso, los medios de prueba."},{"u":7,"t":"En los procedimientos tramitados a solicitud del interesado, la resolución será congruente con las peticiones formuladas por este, sin que en ningún caso pueda:","o":["Modificar el plazo de resolución.","Agravar su situación inicial (prohibición de reformatio in peius) y sin perjuicio de la potestad de la Administración de incoar de oficio un nuevo procedimiento, si procede.","Resolver dentro de plazo.","Estimar parcialmente la pretensión."],"c":1,"e":"Art. 88.2 LPAC. Agravar su situación inicial (prohibición de reformatio in peius) y sin perjuicio de la potestad de la Administración de incoar de oficio un nuevo procedimiento, si procede."},{"u":7,"t":"Las Administraciones Públicas podrán celebrar contratos y convenios con personas de Derecho público y privado, siempre que no sean contrarios al ordenamiento jurídico ni versen sobre materias no susceptibles de transacción y tengan por objeto satisfacer el interés público que tienen encomendado, con el alcance, efectos y régimen jurídico específico que en cada caso prevea la disposición que lo regule, pudiendo tales actos tener la consideración de finalizadores de los procedimientos administrativos o insertarse en los mismos con carácter:","o":["Vinculante y exclusivo.","Previo, vinculante o no, a la resolución que les ponga fin.","Obligatorio en todo caso.","Meramente informativo, sin efecto jurídico alguno."],"c":1,"e":"Art. 86 LPAC. Previo, vinculante o no, a la resolución que les ponga fin."},{"u":7,"t":"El órgano competente para la resolución del procedimiento podrá decidir motivadamente la inadmisión de las solicitudes de reconocimiento de derechos no previstos en el ordenamiento jurídico o manifiestamente carentes de fundamento, así como otras solicitudes que se formulen una vez concluido el procedimiento:","o":["Sin que sea necesario solicitar dictamen alguno.","Mediante resolución motivada, en cualquier momento.","Solo previo dictamen preceptivo del Consejo de Estado.","Solo si lo solicita el interesado."],"c":1,"e":"Art. 88.5 LPAC. Mediante resolución motivada, en cualquier momento."},{"u":7,"t":"El plazo máximo en el que debe notificarse la resolución expresa en los procedimientos iniciados a solicitud del interesado en materia de responsabilidad patrimonial, según se desprende de la regulación general de la LPAC y su conexión con el régimen de los arts. 91-92, es:","o":["El plazo general de seis meses para resolver, salvo que se establezca uno distinto por norma con rango de ley o de Derecho de la Unión Europea.","Quince días en todo caso.","Un año, sin excepciones.","No existe plazo aplicable en esta materia."],"c":0,"e":"Arts. 21, 91-92 LPAC. El plazo general de seis meses para resolver, salvo que se establezca uno distinto por norma con rango de ley o de Derecho de la Unión Europea."},{"u":7,"t":"La extensión de la responsabilidad patrimonial de la Administración (cuya tramitación específica regula el art. 91 LPAC) se rige sustantivamente por lo dispuesto en:","o":["Exclusivamente la LPAC.","La Ley 40/2015, de Régimen Jurídico del Sector Público (LRJSP), que regula los principios de la responsabilidad patrimonial, mientras que la LPAC regula las especialidades procedimentales.","El Código Civil exclusivamente.","El Código Penal."],"c":1,"e":"Art. 91 LPAC y Ley 40/2015. La Ley 40/2015, de Régimen Jurídico del Sector Público (LRJSP), que regula los principios de la responsabilidad patrimonial, mientras que la LPAC regula las especialidades procedimentales."},{"u":7,"t":"Será competente para la resolución de los procedimientos de responsabilidad patrimonial, en el ámbito de la Administración General del Estado:","o":["El Ministro respectivo, en todo caso.","El titular del Ministerio competente o el Consejo de Ministros, en los términos que establece el art. 92 LPAC, previo dictamen del Consejo de Estado cuando sea preceptivo.","Siempre el Consejo de Ministros, sin excepción.","Los Tribunales de lo Contencioso-Administrativo directamente, sin fase administrativa previa."],"c":1,"e":"Art. 92 LPAC. El titular del Ministerio competente o el Consejo de Ministros, en los términos que establece el art. 92 LPAC, previo dictamen del Consejo de Estado cuando sea preceptivo."},{"u":7,"t":"El art. 90 LPAC, relativo a la especificidad del procedimiento sancionador, prevé que cuando las conductas sancionadas hubieran causado daños y perjuicios a la Administración, el órgano competente para resolver el procedimiento sancionador:","o":["Nunca puede pronunciarse sobre la indemnización.","Podrá imponer al infractor, además, la obligación de reparar el daño causado o restituir, en su caso, las cosas a su estado anterior, en los términos que se establezcan reglamentariamente, así como exigir la indemnización por los daños y perjuicios causados, cuando no sean susceptibles de determinación en el procedimiento sancionador, mediante un procedimiento complementario.","Solo puede archivar el expediente.","Debe remitir el asunto íntegramente a la jurisdicción civil sin pronunciarse."],"c":1,"e":"Art. 90 LPAC. Podrá imponer al infractor, además, la obligación de reparar el daño causado o restituir, en su caso, las cosas a su estado anterior, en los términos que se establezcan reglamentariamente, así como exigir la indemnización por los daños y perjuicios causados, cuando no sean susceptibles de determinación en el procedimiento sancionador, mediante un procedimiento complementario."},{"u":8,"t":"Podrá acordarse la tramitación simplificada del procedimiento administrativo común cuando:","o":["Razones de interés público o la falta de complejidad del procedimiento así lo aconsejen.","Solo cuando lo pida expresamente el interesado y la Administración lo acepte sin más requisitos.","Únicamente en materia tributaria.","El procedimiento dure más de seis meses."],"c":0,"e":"Art. 96 LPAC. Razones de interés público o la falta de complejidad del procedimiento así lo aconsejen."},{"u":8,"t":"En el procedimiento administrativo común simplificado, salvo que reste menos para su tramitación ordinaria, deberán resolverse en el plazo de:","o":["Quince días, contados desde el siguiente al que se notifique al interesado el acuerdo de tramitación simplificada.","Treinta días.","Tres meses.","Seis meses."],"c":0,"e":"Art. 96 LPAC. Quince días, contados desde el siguiente al que se notifique al interesado el acuerdo de tramitación simplificada."},{"u":8,"t":"¿Cuál de los siguientes trámites NO se incluye, conforme al art. 96.6 LPAC, en la tramitación simplificada del procedimiento administrativo común?","o":["Inicio del procedimiento de oficio o a solicitud del interesado.","Información pública u otros actos de instrucción que se prevean en la legislación sectorial correspondiente.","Subsanación de la solicitud presentada, en su caso.","Trámite de audiencia, en todo caso, con un plazo no inferior a un mes."],"c":3,"e":"Art. 96.6 LPAC. Trámite de audiencia, en todo caso, con un plazo no inferior a un mes."},{"u":8,"t":"Una vez dictada la resolución que ponga fin al procedimiento, esta será inmediatamente ejecutiva, salvo que:","o":["Se prevea lo contrario en una disposición legal, se trate de una resolución de un procedimiento de naturaleza sancionadora contra la que caben recursos en vía administrativa, o se dé lugar a la suspensión de la ejecución del acto de acuerdo con la Ley.","Nunca puede suspenderse la ejecutividad de un acto administrativo.","Lo solicite el interesado sin más requisitos.","Hayan transcurrido más de tres meses desde su notificación."],"c":0,"e":"Art. 98 LPAC. Se prevea lo contrario en una disposición legal, se trate de una resolución de un procedimiento de naturaleza sancionadora contra la que caben recursos en vía administrativa, o se dé lugar a la suspensión de la ejecución del acto de acuerdo con la Ley."},{"u":8,"t":"Las Administraciones Públicas no iniciarán ninguna actuación material de ejecución de resoluciones que limite derechos de los particulares sin que previamente haya sido adoptada la resolución que le sirva de fundamento jurídico. Esto se denomina:","o":["Principio de proporcionalidad.","Principio de prohibición de la autotutela ejecutiva sin título previo.","Principio de buena fe.","Garantía de procedimiento previo a la ejecución forzosa."],"c":3,"e":"Art. 97 LPAC. Garantía de procedimiento previo a la ejecución forzosa."},{"u":8,"t":"¿Cuáles son los medios de ejecución forzosa de los actos administrativos, conforme al art. 100 LPAC?","o":["Solo el apremio sobre el patrimonio.","Apremio sobre el patrimonio, ejecución subsidiaria, multa coercitiva y compulsión sobre las personas.","Únicamente la compulsión sobre las personas.","El embargo judicial exclusivamente."],"c":1,"e":"Art. 100 LPAC. Apremio sobre el patrimonio, ejecución subsidiaria, multa coercitiva y compulsión sobre las personas."},{"u":8,"t":"Si en algún momento del procedimiento de apremio se llegase a reconocer la improcedencia total o parcial de este, el órgano competente para resolver lo declarará así, acordando:","o":["La devolución de lo indebidamente ingresado, junto con el interés de demora desde la fecha del ingreso.","No se puede devolver nada, el ingreso es firme.","La apertura de un expediente disciplinario contra el deudor.","La condonación íntegra de la deuda."],"c":0,"e":"Art. 101 LPAC. La devolución de lo indebidamente ingresado, junto con el interés de demora desde la fecha del ingreso."},{"u":8,"t":"Habrá lugar a la ejecución subsidiaria cuando se trate de actos que, por no ser personalísimos, puedan ser realizados por sujeto distinto del obligado. En este caso, las Administraciones Públicas realizarán el acto, por sí o a través de las personas que determinen, a costa de:","o":["La propia Administración, sin repercutir el coste.","El obligado, exigiéndose el importe de los gastos, daños y perjuicios por la vía de apremio.","Un tercero ajeno designado por sorteo.","El interesado que denunció la situación."],"c":1,"e":"Art. 102 LPAC. El obligado, exigiéndose el importe de los gastos, daños y perjuicios por la vía de apremio."},{"u":8,"t":"Cuando así lo autoricen las leyes, y en la forma y cuantía que estas determinen, las Administraciones Públicas pueden, para la ejecución de determinados actos, imponer multas coercitivas, reiteradas por lapsos de tiempo que sean suficientes para cumplir lo ordenado, en los siguientes supuestos, entre otros:","o":["Actos personalísimos en que no proceda la compulsión directa sobre la persona del obligado.","En todos los actos administrativos, sin excepción ni necesidad de habilitación legal.","Solo en materia tributaria.","Únicamente cuando el obligado sea una persona jurídica."],"c":0,"e":"Art. 103 LPAC. Actos personalísimos en que no proceda la compulsión directa sobre la persona del obligado."},{"u":8,"t":"Los actos administrativos que impongan una obligación personalísima de no hacer o soportar podrán ejecutarse por compulsión directa sobre las personas en los casos en que la ley expresamente lo autorice, y dentro siempre del respeto debido a:","o":["La dignidad de la persona y a los derechos reconocidos en la Constitución.","Las decisiones discrecionales del agente ejecutor.","El interés económico de la Administración.","Ninguna garantía especial; el respeto a la dignidad no se exige expresamente en este artículo."],"c":0,"e":"Art. 104 LPAC. La dignidad de la persona y a los derechos reconocidos en la Constitución."},{"u":9,"t":"Las Administraciones Públicas, en cualquier momento, por iniciativa propia o a solicitud de interesado, declararán de oficio la nulidad de los actos administrativos que hayan agotado la vía administrativa o que no hayan sido recurridos en plazo, en los supuestos del art. 47.1, previo dictamen favorable de:","o":["El Tribunal Constitucional.","El Consejo de Estado u órgano consultivo equivalente de la Comunidad Autónoma, si lo hubiere.","El Tribunal Supremo.","El Defensor del Pueblo."],"c":1,"e":"Art. 106 LPAC. El Consejo de Estado u órgano consultivo equivalente de la Comunidad Autónoma, si lo hubiere."},{"u":9,"t":"Las facultades de revisión de oficio de actos nulos NO podrán ser ejercitadas cuando:","o":["Por prescripción de acciones, por el tiempo transcurrido o por otras circunstancias, su ejercicio resulte contrario a la equidad, a la buena fe, al derecho de los particulares o a las leyes.","Han transcurrido más de diez años desde que se dictó el acto, en todo caso.","El acto es favorable al interesado.","Nunca existen límites a la revisión de oficio de actos nulos."],"c":0,"e":"Art. 110 LPAC. Por prescripción de acciones, por el tiempo transcurrido o por otras circunstancias, su ejercicio resulte contrario a la equidad, a la buena fe, al derecho de los particulares o a las leyes."},{"u":9,"t":"Las Administraciones Públicas podrán declarar lesivos para el interés público los actos favorables para los interesados que sean anulables conforme al art. 48, a fin de proceder a su posterior impugnación ante el orden jurisdiccional contencioso-administrativo, dentro del plazo de:","o":["Cuatro años desde que se dictó el acto administrativo, previa audiencia de cuantos aparezcan como interesados en el mismo.","Un año.","Diez años.","No existe plazo, puede declararse en cualquier momento."],"c":0,"e":"Art. 107 LPAC. Cuatro años desde que se dictó el acto administrativo, previa audiencia de cuantos aparezcan como interesados en el mismo."},{"u":9,"t":"Las Administraciones Públicas podrán, asimismo, rectificar en cualquier momento, de oficio o a instancia de los interesados, los errores materiales, de hecho o aritméticos existentes en sus actos, siempre que:","o":["No haya transcurrido más de un año desde que se dictó el acto.","No haya transcurrido el plazo de prescripción.","Lo solicite el interesado afectado, sin que pueda hacerse de oficio.","No haya transcurrido más de seis meses."],"c":1,"e":"Art. 109.2 LPAC. No haya transcurrido el plazo de prescripción."},{"u":9,"t":"Las Administraciones Públicas podrán revocar, mientras no haya transcurrido el plazo de prescripción, sus actos de gravamen o desfavorables, siempre que:","o":["Tal revocación no constituya dispensa o exención no permitida por las leyes, ni sea contraria al principio de igualdad, al interés público o al ordenamiento jurídico.","El acto sea favorable al interesado.","Exista una sentencia judicial previa que lo ordene.","Hayan transcurrido más de cuatro años desde que se dictó."],"c":0,"e":"Art. 109.1 LPAC. Tal revocación no constituya dispensa o exención no permitida por las leyes, ni sea contraria al principio de igualdad, al interés público o al ordenamiento jurídico."},{"u":10,"t":"El recurso de alzada se interpone:","o":["Ante el mismo órgano que dictó el acto, exclusivamente.","Ante el órgano superior jerárquico del que dictó el acto recurrido, cuando este no ponga fin a la vía administrativa, pudiendo presentarse también ante el órgano que dictó el acto, que deberá remitirlo al competente en diez días.","Directamente ante el orden jurisdiccional contencioso-administrativo.","Ante el Consejo de Estado en todo caso."],"c":1,"e":"Art. 121 LPAC. Ante el órgano superior jerárquico del que dictó el acto recurrido, cuando este no ponga fin a la vía administrativa, pudiendo presentarse también ante el órgano que dictó el acto, que deberá remitirlo al competente en diez días."},{"u":10,"t":"El plazo para interponer el recurso de alzada contra un acto expreso es de:","o":["Quince días.","Un mes.","Dos meses.","Tres meses."],"c":1,"e":"Art. 122 LPAC. Un mes."},{"u":10,"t":"El plazo máximo para dictar y notificar la resolución de un recurso de alzada es de:","o":["Un mes.","Dos meses.","Tres meses.","Seis meses."],"c":2,"e":"Art. 122 LPAC. Tres meses."},{"u":10,"t":"El recurso de reposición se interpone, con carácter potestativo, contra:","o":["Cualquier acto de trámite, sin excepción.","Los actos administrativos que pongan fin a la vía administrativa, ante el mismo órgano que los hubiera dictado, pudiendo en su lugar impugnarse directamente ante el orden jurisdiccional contencioso-administrativo.","Únicamente actos de las Comunidades Autónomas.","Disposiciones administrativas de carácter general."],"c":1,"e":"Art. 123 LPAC. Los actos administrativos que pongan fin a la vía administrativa, ante el mismo órgano que los hubiera dictado, pudiendo en su lugar impugnarse directamente ante el orden jurisdiccional contencioso-administrativo."},{"u":10,"t":"El plazo máximo para dictar y notificar la resolución del recurso de reposición es de:","o":["Quince días.","Un mes.","Dos meses.","Tres meses."],"c":1,"e":"Art. 124 LPAC. Un mes."},{"u":10,"t":"El recurso extraordinario de revisión procede contra actos firmes en vía administrativa cuando concurra, entre otras causas, que:","o":["El interesado simplemente discrepe del fondo de la resolución.","Al dictarlos se hubiera incurrido en error de hecho que resulte de los propios documentos incorporados al expediente.","Hayan transcurrido más de diez años desde que el acto adquirió firmeza.","El acto haya sido recurrido previamente en alzada sin éxito."],"c":1,"e":"Art. 125 LPAC. Al dictarlos se hubiera incurrido en error de hecho que resulte de los propios documentos incorporados al expediente."},{"u":10,"t":"El recurso extraordinario de revisión fundado en error de hecho que resulte de los propios documentos incorporados al expediente deberá interponerse dentro del plazo de:","o":["Tres meses desde la notificación.","Un año desde la notificación.","Cuatro años desde la fecha de la notificación de la resolución impugnada.","No existe plazo para esta causa."],"c":2,"e":"Art. 125.2 LPAC. Cuatro años desde la fecha de la notificación de la resolución impugnada."},{"u":10,"t":"Son causas de inadmisión de un recurso administrativo, conforme al art. 116 LPAC, entre otras:","o":["Que el recurrente sea una persona jurídica.","Ser incompetente el órgano administrativo (cuando el competente perteneciera a otra Administración Pública, en cuyo caso el recurso deberá remitirse al órgano competente), carecer de legitimación el recurrente, tratarse de un acto no susceptible de recurso, haber transcurrido el plazo de interposición, y carecer el recurso manifiestamente de fundamento.","Que el recurso se presente en horario de tarde.","Que el recurrente no aporte abogado."],"c":1,"e":"Art. 116 LPAC. Ser incompetente el órgano administrativo (cuando el competente perteneciera a otra Administración Pública, en cuyo caso el recurso deberá remitirse al órgano competente), carecer de legitimación el recurrente, tratarse de un acto no susceptible de recurso, haber transcurrido el plazo de interposición, y carecer el recurso manifiestamente de fundamento."},{"u":11,"t":"El ejercicio de la potestad reglamentaria corresponde, conforme al art. 128 LPAC, al Gobierno de la Nación, a los órganos de Gobierno de las Comunidades Autónomas y a los órganos de gobierno locales. Los reglamentos y disposiciones administrativas:","o":["Pueden tipificar delitos e infracciones administrativas libremente.","No podrán vulnerar la Constitución o las leyes, ni regular materias reservadas a las Cortes Generales o Asambleas Legislativas autonómicas, ni tipificar delitos, faltas o infracciones administrativas, ni establecer penas, sanciones o tributos sin la correspondiente cobertura legal.","Prevalecen siempre sobre cualquier ley anterior.","No están sujetos a ningún principio de jerarquía normativa."],"c":1,"e":"Art. 128 LPAC. No podrán vulnerar la Constitución o las leyes, ni regular materias reservadas a las Cortes Generales o Asambleas Legislativas autonómicas, ni tipificar delitos, faltas o infracciones administrativas, ni establecer penas, sanciones o tributos sin la correspondiente cobertura legal."},{"u":11,"t":"Las normas con rango de ley, los reglamentos y disposiciones administrativas habrán de publicarse en el diario oficial correspondiente para que:","o":["Sean simplemente conocidas por el público, sin más efectos.","Entren en vigor y produzcan efectos jurídicos.","Puedan ser recurridas en vía administrativa.","Adquieran rango de ley."],"c":1,"e":"Art. 131 LPAC. Entren en vigor y produzcan efectos jurídicos."}];
const NUM_UNITS=11;
const SHORT_NAMES=["B1 · Generales e interesados","B2 · Actividad y plazos","B3 · Actos administrativos","B4 · Nulidad y anulabilidad","B5 · Garantías e iniciación","B6 · Ordenación e instrucción","B7 · Finalización","B8 · Simplificado y ejecución","B9 · Revisión de oficio","B10 · Recursos administrativos","B11 · Iniciativa y reglamentos"];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildPool(){
  return BANK.map((q,k)=>{
    const idx=shuffle([0,1,2,3]);
    return{k,u:q.u,t:q.t,opts:idx.map(i=>q.o[i]),correct:idx.indexOf(q.c),e:q.e};
  });
}
let pool=buildPool();
const UNAMES={};
for(let i=1;i<=NUM_UNITS;i++){UNAMES[i]=SHORT_NAMES[i-1];}
const SK="lpac_test_adaptativo_v1";
let state={unit:0,mode:"all"};
let db=(()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{records:{}};}catch(e){return{records:{}};}})();
function save(){try{localStorage.setItem(SK,JSON.stringify(db));}catch(e){}}
function rec(k){if(!db.records[k])db.records[k]={ok:0,fail:0};return db.records[k];}
function pct(k){const r=rec(k),t=r.ok+r.fail;return t===0?-1:Math.round(r.ok/t*100);}
function ustat(u){
  const idxs=pool.filter(p=>p.u===u).map(p=>p.k);
  let ok=0,fail=0;
  idxs.forEach(k=>{const r=rec(k);ok+=r.ok;fail+=r.fail;});
  const ans=idxs.filter(k=>rec(k).ok+rec(k).fail>0).length;
  return{total:idxs.length,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):-1};
}
function gstat(){
  let ok=0,fail=0,ans=0;
  pool.forEach(p=>{const r=rec(p.k);ok+=r.ok;fail+=r.fail;if(r.ok+r.fail>0)ans++;});
  return{total:pool.length,ok,fail,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):0};
}
function adaptive(unit){
  let items=unit>0?pool.filter(p=>p.u===unit):pool;
  return items.map(p=>{
    const r=rec(p.k),t=r.ok+r.fail;
    let w=t===0?2:(r.ok/t<0.5?4:r.ok/t<0.75?3:r.ok/t<1?2:0.3);
    return{...p,w};
  }).sort((a,b)=>b.w-a.w).slice(0,20);
}
function filtered(){
  let items=state.unit>0?pool.filter(p=>p.u===state.unit):pool;
  if(state.mode==="fail")items=items.filter(p=>rec(p.k).fail>0);
  if(state.mode==="adaptive")items=adaptive(state.unit);
  return items;
}
function renderNav(){
  const tabs=[{v:0,l:"Todas"}];
  for(let u=1;u<=NUM_UNITS;u++)tabs.push({v:u,l:"B"+u});
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb${state.unit==t.v?" active":""}" onclick="setUnit(${t.v})">${t.l}</button>`).join("")
    +`<button class="nb${state.mode==="adaptive"?" active":""}" style="margin-left:auto" onclick="setMode('adaptive')">🎯 Adaptativo</button>`;
}
function renderStats(){
  const g=gstat();
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-n">${g.answered}/${g.total}</div><div class="stat-l">Respondidas</div></div>
    <div class="stat"><div class="stat-n" style="color:#0f6e56">${g.ok}</div><div class="stat-l">Correctas</div></div>
    <div class="stat"><div class="stat-n" style="color:#a32d2d">${g.fail}</div><div class="stat-l">Erróneas</div></div>
    <div class="stat"><div class="stat-n">${g.pct}%</div><div class="stat-l">% acierto</div></div>`;
  document.getElementById("prog").style.width=g.pct+"%";
}
function renderUBars(){
  let html="";
  for(let u=1;u<=NUM_UNITS;u++){
    const s=ustat(u);
    const p=s.pct<0?0:s.pct;
    const col=s.pct<0?"#b4b2a9":s.pct<50?"#e24b4a":s.pct<75?"#ef9f27":"#1d9e75";
    html+=`<div class="ubar" onclick="setUnit(${u})"><div class="ubar-title">${UNAMES[u]}</div><div class="ubar-track"><div class="ubar-fill" style="width:${p}%;background:${col}"></div></div><div class="ubar-pct">${s.pct<0?"sin datos":s.pct+"%"} · ${s.answered}/${s.total}</div></div>`;
  }
  document.getElementById("ubars").innerHTML=html;
}
function renderCtrl(){
  document.getElementById("ctrl").innerHTML=`
    <button class="btn${state.mode==="all"?" active":""}" onclick="setMode('all')">Todas</button>
    <button class="btn${state.mode==="fail"?" active":""}" onclick="setMode('fail')">Solo erróneas</button>
    <button class="btn${state.mode==="adaptive"?" active":""}" onclick="setMode('adaptive')">🎯 Top 20 adaptativo</button>
    <button class="btn" onclick="reShuf()" title="Rebarajar opciones">🔀 Barajar</button>
    <button class="btn danger" onclick="if(confirm('¿Borrar todo el historial?')){db={records:{}};save();renderAll()}" style="margin-left:auto">Reiniciar</button>`;
}
function renderQuestions(){
  const items=filtered();
  if(!items.length){document.getElementById("questions").innerHTML=`<div class="empty">No hay preguntas en este filtro.</div>`;return;}
  let prev=null,html="";
  items.forEach(p=>{
    if(state.unit===0&&p.u!==prev){html+=`<div class="sep">${UNAMES[p.u]}</div>`;prev=p.u;}
    const r=rec(p.k),pc=pct(p.k);
    const badge=pc<0?"":
      `<span class="qpct" style="background:${pc>=75?"#eaf3de":pc>=50?"#faeeda":"#fcebeb"};color:${pc>=75?"#0f6e56":pc>=50?"#854f0b":"#a32d2d"}">${pc}% (${r.ok+r.fail}v)</span>`;
    html+=`<div class="qcard" id="qc-${p.k}">
      <div class="qhead"><span class="qbadge">${UNAMES[p.u]}</span><div class="qmeta">${badge}<span class="qnum">#${p.k+1}</span></div></div>
      <div class="qtext">${p.t}</div>
      <div class="opts">${p.opts.map((o,i)=>`<button class="opt" id="o-${p.k}-${i}" onclick="answer(${p.k},${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join("")}</div>
      <div id="ex-${p.k}"></div>
    </div>`;
  });
  document.getElementById("questions").innerHTML=html;
}
function answer(k,chosen){
  const p=pool[k],ok=chosen===p.correct,r=rec(k);
  if(ok)r.ok++;else r.fail++;
  save();
  document.getElementById("qc-"+k).classList.add(ok?"ok":"fail");
  for(let i=0;i<p.opts.length;i++){
    const b=document.getElementById("o-"+k+"-"+i);
    b.disabled=true;
    if(i===p.correct)b.classList.add("c-ok");
    if(i===chosen&&!ok)b.classList.add("c-fail");
  }
  document.getElementById("ex-"+k).innerHTML=`<div class="exp"><strong style="color:${ok?"#0f6e56":"#a32d2d"}">${ok?"✓ Correcto":"✗ Incorrecto"}</strong> ${p.e}</div>`;
  renderStats();renderUBars();
}
function setUnit(u){state.unit=parseInt(u);if(state.mode!=="adaptive")state.mode="all";renderAll();}
function setMode(m){state.mode=m;renderCtrl();renderQuestions();}
function reShuf(){pool=buildPool();renderAll();}
function renderAll(){renderNav();renderStats();renderUBars();renderCtrl();renderQuestions();}
renderAll();
</script>
</body>
</html>
