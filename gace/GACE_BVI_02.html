<script>
const BANK=[
// UD1 — Tema 54: Control del gasto público. IGAE. Función interventora. Tribunal de Cuentas ──────
{u:1,t:"¿En qué Título y artículos de la Ley 47/2003, General Presupuestaria, se regula el control interno del gasto público?",o:["Título II, arts. 32-49","Título VI, arts. 140-175","Título IV, arts. 78-89","Título I, arts. 1-19"],c:1,e:"El régimen jurídico básico del control interno se contiene en el Título VI LGP (arts. 140 a 175), que atribuye a la IGAE las funciones de control previo, concomitante y posterior."},
{u:1,t:"¿De qué órgano depende orgánicamente la IGAE, y qué tipo de independencia tiene en el ejercicio de sus funciones de control?",o:["Depende de la Presidencia del Gobierno; independencia jerárquica plena","Está adscrita a la Secretaría de Estado de Presupuestos y Gastos (Ministerio de Hacienda); goza de independencia FUNCIONAL, actuando como órgano staff fuera de la cadena jerárquica de los centros gestores","Depende del Tribunal de Cuentas; independencia total del Poder Ejecutivo","Depende del Ministerio de Justicia; sin independencia funcional"],c:1,e:"La IGAE está adscrita a la Secretaría de Estado de Presupuestos y Gastos, pero goza de independencia funcional en el ejercicio de sus funciones de control, si bien el límite de esa autonomía se manifiesta en que la resolución final de reparos y discrepancias corresponde al Consejo de Ministros."},
{u:1,t:"¿Cuáles son las tres modalidades de control interno que combina la IGAE?",o:["Previo, concomitante y posterior: función interventora, control financiero permanente y auditoría pública","Solo control previo y posterior, sin control concomitante","Control jurisdiccional, disciplinario y político","Control interno, externo y supranacional"],c:0,e:"La IGAE combina control previo (función interventora), control concomitante (control financiero permanente) y control posterior (auditoría pública), además de ser centro directivo de la contabilidad pública."},
{u:1,t:"Conforme al art. 148 LGP, ¿qué es la función interventora?",o:["El control posterior y selectivo de la actividad económico-financiera","El control previo exclusivo de legalidad sobre actos que dan lugar al reconocimiento de derechos o a la realización de gastos, así como los ingresos y pagos derivados","El control externo ejercido por el Tribunal de Cuentas","El control continuo ejercido por la Intervención Delegada sobre determinadas entidades"],c:1,e:"El art. 148 LGP define la función interventora como el control previo exclusivo de legalidad que ejerce la IGAE sobre los actos que dan lugar al reconocimiento de derechos o a la realización de gastos, así como los ingresos y pagos que de ellos se deriven."},
{u:1,t:"¿A qué entidades del sector público estatal NO se aplica la función interventora?",o:["A la Administración General del Estado","A los Organismos Autónomos","A las entidades públicas empresariales, fundaciones del sector público y sociedades mercantiles estatales","A las Entidades Gestoras de la Seguridad Social"],c:2,e:"La función interventora se aplica a la AGE, los Organismos Autónomos y las Entidades Gestoras y Servicios Comunes de la Seguridad Social (no las Mutuas). No se aplica a entidades públicas empresariales, fundaciones del sector público ni sociedades mercantiles estatales, sometidas a otras vías de control."},
{u:1,t:"¿Cuál es el plazo general para el ejercicio de la fiscalización previa por la Intervención Delegada?",o:["5 días hábiles","10 días hábiles desde que dispone del expediente completo","1 mes natural","15 días naturales"],c:1,e:"La regla general es de 10 días hábiles contados desde el día siguiente a aquel en que la Intervención Delegada disponga del expediente completo; existen plazos reducidos en fiscalización limitada previa o expedientes urgentes."},
{u:1,t:"¿Qué efecto produce el reparo formulado por la Intervención conforme al art. 154 LGP?",o:["Extingue automáticamente el expediente","Suspende la tramitación del expediente hasta que se subsanen los defectos o se resuelva la discrepancia","Obliga al cese del órgano gestor","No tiene efecto suspensivo, solo informativo"],c:1,e:"El reparo (art. 154 LGP) suspende la tramitación del expediente hasta que se subsanen los defectos observados o, si el órgano gestor no lo acepta, hasta que se resuelva la discrepancia por el procedimiento legalmente previsto."},
{u:1,t:"¿Qué consecuencia tiene, conforme al art. 156 LGP, la omisión de la función interventora cuando ésta es preceptiva?",o:["El gasto se convalida automáticamente a los 3 meses","No puede reconocerse la obligación ni tramitarse el resto de fases del gasto hasta que se subsane la omisión, y no cabe informe favorable de la Intervención","Se traslada el expediente directamente al Tribunal de Cuentas para su enjuiciamiento","Solo genera responsabilidad disciplinaria, sin efectos sobre la tramitación"],c:1,e:"La omisión de la función interventora preceptiva impide reconocer la obligación y tramitar el resto de fases del gasto hasta subsanar la omisión, y no puede emitirse informe favorable de la Intervención (art. 156 LGP)."},
{u:1,t:"Conforme al art. 159 LGP, ¿cuáles son los cuatro objetivos del control financiero permanente?",o:["Legalidad, eficacia policial, disciplina y sanción","Control de legalidad, control presupuestario, control de tesorería y control de eficacia/eficiencia/economía","Solo control de legalidad y control disciplinario","Control de personal, control de bienes, control de contratos y control de subvenciones exclusivamente"],c:1,e:"El art. 159 LGP fija cuatro objetivos del control financiero permanente: control de legalidad, control presupuestario, control de tesorería y control de eficacia, eficiencia y economía."},
{u:1,t:"¿Qué modalidades de auditoría distingue el art. 163 LGP?",o:["Solo auditoría de cuentas anuales","Auditoría de regularidad contable (incluida la de cuentas anuales), de cumplimiento y operativa, que pueden combinarse entre sí","Auditoría fiscal, penal y civil","Auditoría previa, simultánea y ulterior"],c:1,e:"El art. 163 LGP distingue tres modalidades de auditoría pública, que pueden combinarse: de regularidad contable (con la auditoría de cuentas anuales como submodalidad), de cumplimiento y operativa."},
{u:1,t:"¿Cuál es el fundamento constitucional del Tribunal de Cuentas y qué garantiza la Constitución respecto a sus miembros?",o:["Art. 103 CE; garantiza solo su régimen retributivo","Art. 136 CE; garantiza la independencia e inamovilidad de sus miembros y reserva de ley orgánica para su composición, organización y funciones","Art. 149 CE; no exige ley orgánica","Art. 117 CE; los equipara a jueces y magistrados sin más matices"],c:1,e:"El art. 136 CE configura el Tribunal de Cuentas como supremo órgano fiscalizador, garantizando la independencia e inamovilidad de sus miembros y reservando a ley orgánica su composición, organización y funciones (LO 2/1982, LOTCu)."},
{u:1,t:"¿Qué modificación introdujo la Ley Orgánica 2/2024, de 1 de agosto, en la LOTCu?",o:["Modificó el art. 39 LOTCu sobre causas de exención de responsabilidad contable","Introdujo en el art. 30 LOTCu un mínimo del 40% de cada sexo en la designación de Consejeros de Cuentas por cada Cámara","Suprimió la función jurisdiccional del Tribunal de Cuentas","Trasladó la competencia fiscalizadora a la IGAE"],c:1,e:"La LO 2/2024, de representación paritaria, modifica el art. 30 LOTCu introduciendo un mínimo del 40% de cada sexo en la designación de Consejeros de Cuentas por cada Cámara (aplicable a designaciones posteriores al 22/08/2024). La modificación del art. 39 LOTCu (causas de exención de responsabilidad contable) corresponde a la LO 1/2024, de amnistía."},
{u:1,t:"¿Qué criterio de imputación subjetiva exige la responsabilidad contable ante el Tribunal de Cuentas?",o:["Cualquier grado de culpa, por leve que sea","Dolo, culpa o negligencia GRAVES","Solo dolo directo, excluyendo la culpa","Responsabilidad objetiva, sin necesidad de culpa"],c:1,e:"La responsabilidad contable exige dolo, culpa o negligencia GRAVES como criterio de imputación subjetiva; la negligencia leve no genera responsabilidad contable ante el Tribunal de Cuentas."},
// UD2 — Tema 57: Ingresos públicos. Sistema tributario. Tasas y precios públicos ─────
{u:2,t:"Conforme al art. 5 LGP, ¿qué comprende la Hacienda Pública estatal?",o:["Solo los ingresos tributarios del Estado","El conjunto de derechos y obligaciones de contenido económico cuya titularidad corresponde a la AGE y a sus organismos autónomos","Únicamente los derechos de naturaleza privada del Estado","El patrimonio inmobiliario del Estado exclusivamente"],c:1,e:"El art. 5 LGP define la Hacienda Pública estatal como el conjunto de derechos y obligaciones de contenido económico cuya titularidad corresponde a la Administración General del Estado y a sus organismos autónomos."},
{u:2,t:"¿Qué prerrogativa distingue a los ingresos de Derecho Público frente a los de Derecho Privado?",o:["Ninguna: se cobran igual en ambos casos","Solo los ingresos de Derecho Público pueden exigirse por la vía de apremio administrativa, sin intervención judicial previa","Los ingresos de Derecho Privado siempre tienen preferencia de cobro","Los ingresos de Derecho Público prescriben a los 20 años"],c:1,e:"Solo los ingresos de Derecho Público disfrutan de las prerrogativas y procedimientos de Derecho Administrativo y Tributario, entre ellas la vía de apremio sin necesidad de intervención judicial previa (art. 5 LGP)."},
{u:2,t:"¿Cuántos capítulos distingue el art. 41 LGP en la clasificación económica del presupuesto de ingresos, y cómo se agrupan?",o:["6 capítulos: corrientes, capital y financieros","9 capítulos: 1-5 operaciones corrientes, 6-7 operaciones de capital, 8-9 operaciones financieras","12 capítulos sin agrupación","3 capítulos: tributarios, patrimoniales y crediticios exclusivamente"],c:1,e:"El art. 41 LGP desglosa los ingresos en 9 capítulos: del 1 al 5 son operaciones corrientes, 6 y 7 operaciones de capital, y 8 y 9 operaciones financieras."},
{u:2,t:"¿Qué establece el principio de no afectación de los ingresos (art. 27 LGP)?",o:["Que cada ingreso debe financiar exclusivamente el gasto que lo originó","Que, como regla, todos los ingresos del Estado financian indistintamente todos los gastos, salvo excepciones legales expresas","Que los ingresos tributarios no pueden financiar gastos de capital","Que los ingresos patrimoniales están siempre afectados"],c:1,e:"El art. 27 LGP consagra el principio de no afectación como regla general: todos los ingresos financian indistintamente todos los gastos, siendo la afectación la excepción (p. ej., las contribuciones especiales, afectadas por ley)."},
{u:2,t:"Conforme al art. 2.1 LGT, ¿qué son los tributos?",o:["Cualquier ingreso del sector público, tenga o no origen legal","Prestaciones pecuniarias exigidas por una Administración Pública como consecuencia de la realización del supuesto de hecho al que la ley vincula el deber de contribuir","Prestaciones personales obligatorias impuestas por ley","Ingresos exclusivamente voluntarios de Derecho Privado"],c:1,e:"El art. 2.1 LGT define los tributos como prestaciones pecuniarias exigidas por una Administración Pública como consecuencia de la realización del supuesto de hecho al que la ley vincula el deber de contribuir, con el fin primordial de sostener el gasto público."},
{u:2,t:"¿Cuáles son los cuatro principios del art. 31.1 CE que rigen el sistema tributario?",o:["Legalidad, jerarquía, competencia y eficacia","Capacidad económica, igualdad, progresividad y no confiscatoriedad","Anualidad, unidad de caja, universalidad y especialidad","Territorialidad, personalidad, temporalidad y proporcionalidad"],c:1,e:"El art. 31.1 CE recoge los principios de capacidad económica (gravar riqueza real), igualdad, progresividad (a mayor capacidad, mayor tipo) y no confiscatoriedad (límite a la progresividad)."},
{u:2,t:"¿Puede la Ley de Presupuestos Generales del Estado crear tributos ex novo?",o:["Sí, siempre que se apruebe por mayoría absoluta","No: conforme al art. 134.7 CE, solo puede modificar tributos ya existentes cuando una ley tributaria sustantiva lo prevea expresamente","Sí, pero solo tasas, nunca impuestos","No puede ni crear ni modificar ningún tributo"],c:1,e:"El art. 134.7 CE prohíbe que la Ley de Presupuestos cree tributos; solo puede modificarlos cuando una ley tributaria sustantiva así lo prevea expresamente. Es una de las preguntas clásicas de examen."},
{u:2,t:"¿Qué potestad tributaria tienen las Comunidades Autónomas y las Entidades Locales conforme al art. 133.2 CE?",o:["Potestad originaria, igual que el Estado","Potestad derivada: pueden establecer y exigir tributos de acuerdo con la Constitución y las leyes, pero no ostentan la potestad originaria, que corresponde solo al Estado (art. 133.1 CE)","Ninguna potestad tributaria propia","Solo pueden crear tasas, nunca impuestos ni contribuciones especiales"],c:1,e:"El art. 133.1 CE reserva la potestad tributaria ORIGINARIA al Estado mediante ley; las CCAA y EELL tienen potestad DERIVADA conforme al art. 133.2 CE, pudiendo establecer y exigir tributos de acuerdo con la Constitución y las leyes."},
{u:2,t:"¿Cuál es la diferencia esencial entre una tasa y un impuesto?",o:["No hay diferencia jurídica relevante","El impuesto se exige sin contraprestación, por la mera capacidad económica; la tasa exige una actividad administrativa (dominio público o servicio no voluntario/sin alternativa privada) referida al obligado","La tasa siempre es superior en cuantía al impuesto","El impuesto solo puede ser autonómico o local, nunca estatal"],c:1,e:"El impuesto (art. 2.2.c LGT) grava la capacidad económica sin contraprestación directa. La tasa (art. 2.2.a LGT) exige una actividad administrativa referida al obligado: utilización del dominio público o un servicio no voluntario/sin alternativa privada."},
{u:2,t:"¿Cuál es el límite cuantitativo de una tasa conforme al art. 7 LTPP?",o:["No tiene límite legal","No puede exceder, en su conjunto, del coste real o previsible del servicio o actividad","Debe superar siempre el coste del servicio para financiar otras partidas","Se fija libremente por el Consejo de Ministros sin referencia al coste"],c:1,e:"El art. 7 LTPP establece que la tasa no puede exceder, en su conjunto, del coste real o previsible del servicio o actividad; no busca beneficio para la Administración, sino recuperación de costes."},
{u:2,t:"¿Dónde existen actualmente las contribuciones especiales como figura tributaria en España?",o:["Únicamente a nivel estatal","Solo en el ámbito autonómico y local; no existen a nivel estatal en la actualidad","En los tres niveles territoriales por igual","Han sido derogadas en todos los niveles"],c:1,e:"Las contribuciones especiales (art. 2.2.b LGT) no existen actualmente a nivel estatal: solo operan en el ámbito autonómico y local, y son ingresos afectados por ley a la obra o servicio que las origina."},
{u:2,t:"¿Qué dos condiciones deben cumplirse ACUMULATIVAMENTE, conforme al art. 24 LTPP, para que una contraprestación sea precio público y no tasa?",o:["Ser cobrada por la Administración y tener cuantía fija","Ser de solicitud voluntaria por el administrado Y que el servicio también sea prestado por el sector privado (existe alternativa comparable)","Superar los 5.000 € y estar sujeta a IVA","Ser prestada solo por Organismos Autónomos"],c:1,e:"El art. 24 LTPP exige, de forma acumulativa, voluntariedad (el ciudadano puede elegir libremente) y concurrencia privada (el servicio también lo presta el sector privado). Si falta cualquiera de las dos, la figura es tasa, no precio público."},
{u:2,t:"¿Cuál es el límite cuantitativo de un precio público conforme al art. 25 LTPP, y qué excepción existe?",o:["Límite máximo = coste, igual que la tasa, sin excepciones","Límite MÍNIMO = debe cubrir al menos el coste económico o la utilidad derivada, salvo los 'precios políticos' (art. 25.2 LTPP) fijados por debajo del coste con previsión presupuestaria expresa para cubrir la diferencia","No tiene límite alguno","Se fija siempre por ley, nunca por Orden Ministerial"],c:1,e:"A diferencia de la tasa (límite MÁXIMO = coste, art. 7 LTPP), el precio público tiene un límite MÍNIMO = coste (art. 25 LTPP), salvo los precios políticos, que pueden fijarse por debajo del coste si existe previsión presupuestaria expresa para cubrir el déficit (art. 25.2 LTPP). Es la inversión de lógica que más se confunde en examen."},
{u:2,t:"¿Qué impuestos estatales NO están cedidos, ni total ni parcialmente, a las Comunidades Autónomas de régimen común?",o:["IRPF e IVA","El Impuesto sobre Sociedades y el Impuesto sobre la Renta de No Residentes","IBI e IAE","ISD e ITP-AJD"],c:1,e:"El Impuesto sobre Sociedades y el Impuesto sobre la Renta de No Residentes quedan íntegramente en la Hacienda estatal; NO están cedidos a las Comunidades Autónomas, a diferencia del IRPF e IVA (cedidos al 50%) u otros cedidos al 100% (Patrimonio, ISD, ITP-AJD, Juego, Electricidad, Matriculación)."},
// UD3 — Tema 58: Retribuciones. Nóminas. Altas y bajas. Devengo y liquidación ─────
{u:3,t:"¿Qué naturaleza jurídica tienen las retribuciones básicas de los funcionarios y quién puede modificarlas?",o:["Son graciables y pueden suprimirse discrecionalmente por el órgano gestor","Tienen carácter de derecho adquirido y solo pueden modificarse por ley; se fijan anualmente en la Ley de Presupuestos Generales del Estado","Se fijan por convenio colectivo, igual que en el personal laboral","Son competencia exclusiva de cada Departamento ministerial"],c:1,e:"Las retribuciones básicas retribuyen la pertenencia a un cuerpo o escala y tienen carácter de derecho adquirido: solo pueden modificarse por ley, fijándose anualmente sus cuantías en la Ley de Presupuestos Generales del Estado, iguales para todos los funcionarios del mismo subgrupo en todas las AAPP."},
{u:3,t:"Conforme al art. 24 EBEP, ¿qué límite de proporcionalidad rige entre el sueldo del subgrupo A1 y el del grupo E?",o:["El A1 no puede superar en más de dos veces el del grupo E","El A1 no puede superar en más de tres veces el del grupo E (o agrupaciones profesionales sin requisito de titulación)","No existe límite legal de proporcionalidad","El A1 debe ser exactamente el doble del C1"],c:1,e:"El art. 24 EBEP limita el sueldo del subgrupo A1 a no superar en más de tres veces el del grupo E (agrupaciones profesionales sin requisito de titulación), garantizando la cohesión retributiva del sistema."},
{u:3,t:"¿Cuándo se devenga un trienio y quién lo reconoce en la Administración General del Estado?",o:["Se devenga el mismo día en que se cumple, y lo reconoce el Ministro de Hacienda","Desde el primer día del mes siguiente al cumplimiento de cada trienio; lo reconoce el Subsecretario del Departamento (o el Presidente/Director en Organismos Autónomos)","Se devenga con efectos retroactivos al inicio del año natural; lo reconoce el Tribunal de Cuentas","No requiere reconocimiento expreso: se abona automáticamente sin resolución"],c:1,e:"El trienio se devenga desde el primer día del mes siguiente al cumplimiento de cada periodo de tres años de servicios efectivos, y su reconocimiento corresponde al Subsecretario del Departamento (o Presidente/Director del Organismo Autónomo)."},
{u:3,t:"¿Qué conceptos retributivos incluye cada paga extraordinaria (junio y diciembre)?",o:["Solo el sueldo base","Sueldo (cuantía específica fijada en la LPGE), trienios que correspondan, y una mensualidad completa del complemento de destino","Sueldo, trienios y complemento específico completo","Únicamente el complemento de productividad del semestre"],c:1,e:"Cada paga extraordinaria incluye el sueldo (con la cuantía específica de la LPGE, inferior a la mensual ordinaria), los trienios correspondientes, y una mensualidad completa (100%) del complemento de destino."},
{u:3,t:"¿Cuántos años de permanencia continuada, o con interrupción, consolidan el grado personal correspondiente al nivel de un puesto?",o:["1 año continuado, o 2 con interrupción","2 años continuados en puestos de un mismo nivel, o 3 años con interrupción en puestos de ese mismo nivel","5 años continuados exclusivamente, sin posibilidad de cómputo con interrupción","Se consolida automáticamente al tomar posesión del puesto"],c:1,e:"El grado personal se consolida por el desempeño continuado de puestos de un mismo nivel durante 2 años, o durante 3 años con interrupción, garantizando (art. 70 RD 364/1995) el derecho a percibir como mínimo el complemento de destino del nivel consolidado."},
{u:3,t:"¿Cuántas pagas al año tiene el complemento específico, y cómo se diferencian de las pagas extraordinarias?",o:["12 pagas, igual que el sueldo, sin pagas adicionales","14 pagas: 12 mensualidades ordinarias más 2 pagas adicionales en junio y diciembre del mismo importe que la mensualidad ordinaria (no son pagas extraordinarias)","2 pagas anuales exclusivamente, como pagas extraordinarias","24 pagas, dos por cada mes del año"],c:1,e:"El complemento específico se percibe en 14 pagas: 12 mensualidades ordinarias más 2 pagas adicionales (junio y diciembre) del mismo importe que la mensualidad ordinaria, que NO tienen la consideración de pagas extraordinarias."},
{u:3,t:"¿Qué órgano determina la cuantía global del complemento de productividad asignada a cada Departamento, y qué principio rige su publicidad?",o:["El Ministerio de Hacienda determina la cuantía global; las cantidades percibidas son de conocimiento público para los demás funcionarios y representantes sindicales (principio de publicidad)","El propio funcionario negocia individualmente su cuantía con total confidencialidad","El Tribunal de Cuentas fija la cuantía; no existe obligación de publicidad","Se determina por convenio colectivo, sin intervención del Ministerio de Hacienda"],c:0,e:"El Ministerio de Hacienda determina la cuantía global asignada a cada Departamento (el Ministro la distribuye internamente); rige el principio de publicidad: las cantidades percibidas son de conocimiento público para los demás funcionarios y los representantes sindicales."},
{u:3,t:"¿Qué característica distingue a las gratificaciones por servicios extraordinarios de otras retribuciones complementarias?",o:["Tienen carácter fijo y periódico, como el sueldo","En ningún caso pueden ser fijas en su cuantía ni periódicas en su devengo, al retribuir servicios excepcionales fuera de la jornada habitual","Se perciben en 14 pagas, igual que el complemento específico","Solo pueden percibirlas los funcionarios del subgrupo A1"],c:1,e:"Las gratificaciones por servicios extraordinarios (concepto económico 151) tienen carácter excepcional: en ningún caso pueden ser fijas en su cuantía ni periódicas en su devengo, a diferencia de otras retribuciones complementarias estables."},
{u:3,t:"¿Qué introduce el Real Decreto-ley 6/2023, de 19 de diciembre, en materia retributiva?",o:["Suprime los trienios y los sustituye por un complemento único","La carrera horizontal, que permite la progresión profesional sin cambiar de puesto mediante el ascenso voluntario a través de tramos, retribuida por el complemento de carrera","Un nuevo sistema de oposición única para todos los cuerpos","La eliminación del complemento de destino"],c:1,e:"El RDL 6/2023 introduce la carrera horizontal, que permite progresar profesionalmente sin cambiar de puesto de trabajo mediante el ascenso voluntario a través de tramos, retribuida mediante el complemento de carrera, de cuantía idéntica para todos los funcionarios del mismo grupo/subgrupo y tramo."},
{u:3,t:"¿Cuál es la regla general de devengo y cuántos supuestos de liquidación por días existen como excepción?",o:["Regla general: liquidación por días siempre; no hay excepciones","Regla general: mensualidad completa según la situación del funcionario el primer día hábil del mes; existen 5 supuestos tasados de liquidación por días","Regla general: liquidación por horas trabajadas; 2 excepciones","No existe regla general: cada Ministerio decide libremente"],c:1,e:"La regla general es la mensualidad completa, con referencia a la situación del funcionario el primer día hábil del mes. Los 5 supuestos de liquidación por días son: cese (salvo fallecimiento/jubilación/retiro), cambio de puesto/Administración, toma de posesión del primer destino, reingreso al servicio activo, e incorporación tras licencia sin retribución."},
{u:3,t:"Conforme al art. 25 LGP, ¿en cuánto tiempo prescribe el derecho a exigir el pago de obligaciones ya reconocidas por la Hacienda Pública estatal?",o:["2 años","4 años","5 años","10 años"],c:1,e:"El art. 25 LGP fija en CUATRO AÑOS la prescripción del derecho al reconocimiento o liquidación de toda obligación, así como el derecho a exigir el pago de las obligaciones ya reconocidas."},
{u:3,t:"¿Qué son los 'ingresos en formalización' en materia de nóminas?",o:["Pagos que se realizan en efectivo directamente al funcionario, sin retención alguna","Descuentos practicados en nómina (IRPF, cotizaciones a Clases Pasivas, MUFACE, ISFAS, MEI) que no salen físicamente de la caja del Tesoro, imputándose simultáneamente como gasto (Cap. 1) e ingreso en el presupuesto de ingresos","Los atrasos abonados con efectos retroactivos tras una subida salarial","Las indemnizaciones por razón del servicio percibidas fuera de nómina"],c:1,e:"Los ingresos en formalización son descuentos en nómina (IRPF, cotizaciones a Clases Pasivas, MUFACE, ISFAS, MEI…) que no implican movimiento físico de fondos: se imputan simultáneamente al presupuesto de gastos (pago de la nómina, Cap. 1) y al presupuesto de ingresos (recaudación)."},
{u:3,t:"¿Qué excepción al principio de anualidad (art. 34 LGP) permite el art. 34.2 LGP respecto a los atrasos a favor del personal?",o:["Ninguna: los atrasos siempre se imputan al ejercicio en que se devengaron originalmente","Los atrasos a favor del personal pueden imputarse a los créditos del presupuesto vigente en el momento de expedirse las órdenes de pago, aunque se refieran a derechos devengados en ejercicios anteriores","Los atrasos requieren siempre la tramitación de un crédito extraordinario","Los atrasos del personal prescriben automáticamente si no se pagan en el mismo ejercicio"],c:1,e:"El art. 34.2 LGP excepciona el principio de anualidad (art. 34 LGP) permitiendo que los atrasos a favor del personal se imputen al presupuesto vigente en el momento de expedir las órdenes de pago, aunque se refieran a derechos devengados en ejercicios anteriores, sin necesidad de crédito extraordinario."},
// UD4 — Repaso integrador Bloque VI completo (Temas 51-58) ─────
{u:4,t:"En el procedimiento de ejecución del gasto (fases A-D-O-K, Tema 55), ¿en qué momento actúa la función interventora (Tema 54) con su control previo pleno?",o:["Solo tras el pago material, nunca antes","Antes de que el acto de gasto se apruebe o comprometa, como filtro previo de legalidad, salvo los actos exceptuados de fiscalización previa","Únicamente en la fase de reconocimiento de la obligación","Solo cuando lo solicita expresamente el órgano gestor"],c:1,e:"La función interventora (Tema 54) actúa como control PREVIO de legalidad: se ejerce antes de que se apruebe, comprometa o reconozca una obligación, salvo los actos expresamente exceptuados de fiscalización previa (contratos menores, gastos de tracto sucesivo ya fiscalizados, ACF <5.000€, etc.)."},
{u:4,t:"¿Cómo se conectan el control interno (IGAE) y el control externo (Tribunal de Cuentas) en el ciclo de rendición de cuentas?",o:["No existe conexión: son controles independientes y no se comunican","Todas las entidades del sector público estatal rinden sus cuentas anuales al Tribunal de Cuentas por conducto de la IGAE, que además remite los informes de auditoría pública de cuentas anuales junto con las cuentas","El Tribunal de Cuentas sustituye a la IGAE en la función interventora","La IGAE fiscaliza al Tribunal de Cuentas anualmente"],c:1,e:"El control interno (IGAE) alimenta al control externo (Tribunal de Cuentas): todas las entidades rinden sus cuentas anuales al Tribunal por conducto de la IGAE, que remite también los informes de auditoría de cuentas anuales junto con éstas."},
{u:4,t:"El Fondo de Contingencia (Tema 53, art. 50 LGP) puede utilizarse para financiar créditos extraordinarios o suplementos. ¿Qué órgano autoriza esa financiación cuando se trata de operaciones no financieras?",o:["Las Cortes Generales, siempre mediante ley","El Consejo de Ministros, cuando la financiación procede de una baja en el Fondo de Contingencia","El Interventor General en solitario","El Tribunal de Cuentas, previa fiscalización"],c:1,e:"Cuando un crédito extraordinario o suplemento de operaciones no financieras se financia con baja en el Fondo de Contingencia, la autorización corresponde al Consejo de Ministros; si la baja es en otros créditos no financieros, corresponde a las Cortes Generales mediante ley."},
{u:4,t:"¿En qué capítulo presupuestario de gastos se imputan las retribuciones de los funcionarios (Tema 58), y qué modalidad de control las somete a fiscalización previa cuando corresponde?",o:["Capítulo 4 (transferencias corrientes); no están sujetas a control alguno","Capítulo 1 (gastos de personal); están sometidas a la función interventora (Tema 54) sobre la AGE y sus Organismos Autónomos, salvo actos exceptuados","Capítulo 6 (inversiones reales); solo sujetas a auditoría pública","Capítulo 2; sujetas exclusivamente a control financiero permanente"],c:1,e:"Las retribuciones de personal se imputan al Capítulo 1 del presupuesto de gastos y están sometidas, como cualquier gasto de la AGE y OO.AA., a la función interventora (Tema 54), salvo los actos exceptuados de fiscalización previa."},
{u:4,t:"¿Qué relación existe entre el principio de no afectación de los ingresos (Tema 57, art. 27 LGP) y las contribuciones especiales?",o:["Las contribuciones especiales confirman la regla general de no afectación","Las contribuciones especiales son la excepción: por ley están AFECTADAS y solo pueden financiar la obra o servicio que las origina, frente a la regla general de no afectación","No guardan relación: la no afectación solo se aplica a impuestos","Las contribuciones especiales están prohibidas precisamente por el principio de no afectación"],c:1,e:"El art. 27 LGP consagra la no afectación como regla general (todos los ingresos financian todos los gastos), pero las contribuciones especiales (Tema 57) son un ejemplo clásico de ingreso AFECTADO por ley: solo financian la obra o servicio que las genera."},
{u:4,t:"¿Qué tienen en común, y en qué se diferencian, el Anticipo de Caja Fija (Tema 56) y el control financiero permanente (Tema 54) respecto a su carácter temporal?",o:["Ambos son instrumentos puntuales y no permanentes","El ACF es una provisión de fondos de carácter PERMANENTE (aunque extrapresupuestaria); el control financiero permanente también es continuo, pero ejercido por la Intervención Delegada como modalidad de control, no como instrumento de pago","No tienen ninguna relación conceptual","El ACF es temporal y el control financiero permanente es puntual"],c:1,e:"El ACF (Tema 56) es una provisión de fondos extrapresupuestaria y PERMANENTE para gastos corrientes periódicos; el control financiero permanente (Tema 54) también tiene carácter continuo, pero como modalidad de control ejercida por la Intervención Delegada, no como mecanismo de pago."},
{u:4,t:"Los trienios (Tema 58) se devengan mensualmente y se reconocen por el Subsecretario. ¿Qué documento y qué fase de ejecución del gasto (Tema 55) reflejan su reconocimiento como obligación mensual en nómina?",o:["Documento RC, en fase de Aprobación (A)","La nómina mensual, dentro del ciclo de reconocimiento de la obligación (fase O/OK), imputada al Capítulo 1","El documento MC080, propio de las generaciones de crédito","No se documentan contablemente"],c:1,e:"Los trienios, como el resto de retribuciones, se reconocen mensualmente a través de la nómina, que constituye el reconocimiento de la obligación (fase O/OK del ciclo de ejecución del gasto, Tema 55) imputado al Capítulo 1."},
{u:4,t:"¿Cuál es la diferencia entre el plazo de prescripción de derechos económicos del personal (Tema 58, art. 25 LGP) y el plazo de rendición de cuentas de un Pago a Justificar (Tema 56, art. 79 LGP)?",o:["Son el mismo plazo: 4 años en ambos casos","El derecho a exigir el pago de obligaciones reconocidas prescribe a los 4 años (art. 25 LGP); el PaJ debe justificarse en 3 meses, ampliables a 6 (o 6 meses, ampliables a 12, en expropiaciones/extranjero) (art. 79 LGP)","El PaJ no tiene plazo de justificación; los derechos económicos prescriben al año","Ambos plazos son de 10 años"],c:1,e:"Son institutos distintos: la prescripción de derechos económicos (Tema 58) es de 4 años (art. 25 LGP); el plazo de rendición de cuentas de un PaJ (Tema 56) es de 3 meses ampliables a 6 (regla general) o 6 meses ampliables a 12 (expropiaciones/extranjero), conforme al art. 79 LGP."},
{u:4,t:"¿Qué órgano de control sería competente para revisar, con posterioridad, si un Anticipo de Caja Fija (Tema 56) se ha gestionado conforme a los principios de buena gestión financiera, y mediante qué modalidad de control (Tema 54)?",o:["El Tribunal de Cuentas exclusivamente, mediante función interventora","La IGAE, mediante control financiero permanente o auditoría pública, dado su carácter continuo/posterior sobre la gestión económico-financiera del centro gestor","El Congreso de los Diputados, mediante control político","Ningún órgano: el ACF está exento de todo control"],c:1,e:"La gestión del ACF, como el resto de la actividad económico-financiera de los centros gestores, puede ser objeto de control financiero permanente (continuo) o de auditoría pública (posterior y selectiva) por la IGAE, modalidades del Tema 54 distintas de la función interventora previa."},
{u:4,t:"¿Qué relación existe entre la potestad tributaria originaria del Estado (Tema 57, art. 133.1 CE) y la aprobación anual de la Ley de Presupuestos (Tema 52)?",o:["La Ley de Presupuestos puede crear y suprimir tributos libremente cada año","Son competencias distintas: la Ley de Presupuestos NO puede crear tributos ex novo (art. 134.7 CE), reservándose la potestad tributaria originaria al Estado mediante ley tributaria sustantiva (art. 133.1 CE)","La potestad tributaria originaria corresponde a las Cortes Generales, no al Estado","La Ley de Presupuestos sustituye a la ley tributaria sustantiva cada ejercicio"],c:1,e:"Aunque ambas son leyes estatales, la Ley de Presupuestos (Tema 52) NO puede ejercer la potestad tributaria originaria (Tema 57): no puede crear tributos ex novo (art. 134.7 CE); esa potestad se reserva a la ley tributaria sustantiva conforme al art. 133.1 CE."},
{u:4,t:"En el ciclo completo del Bloque VI, ¿qué documento conecta la fase de reconocimiento de la obligación (Tema 55) con el control previo de legalidad (Tema 54) antes del pago?",o:["El documento OK (reconocimiento de la obligación y propuesta de pago), que debe haber superado la fiscalización previa de la función interventora antes de proseguir hacia el pago","El documento RC, exclusivamente","La nómina, sin ningún control previo","El Plan Anual de Auditorías"],c:0,e:"El documento OK (reconocimiento de la obligación + propuesta de pago) es el punto de conexión: antes de proseguir hacia el pago material, el gasto debe haber superado el control previo de legalidad de la función interventora (Tema 54), salvo actos exceptuados."},
{u:4,t:"¿Qué principio comparten el límite máximo de una tasa (Tema 57, art. 7 LTPP: no superar el coste) y el límite del Anticipo de Caja Fija (Tema 56, 7% del Cap. 2)?",o:["Ninguno: son figuras jurídicas sin relación conceptual","Ambos son manifestaciones del principio de buena gestión financiera y proporcionalidad: evitar que un instrumento excepcional (tasa sin ánimo de lucro; ACF como excepción al procedimiento ordinario) se utilice más allá de su finalidad y límites tasados","Ambos requieren aprobación de las Cortes Generales","Ambos se refieren al mismo capítulo presupuestario"],c:1,e:"Aunque son institutos distintos (ingreso vs. instrumento de pago), ambos limitan un mecanismo con finalidad tasada: la tasa no debe generar beneficio para la Administración (solo cubrir coste) y el ACF es una excepción cuantitativamente limitada (7% del Cap. 2) al procedimiento ordinario de pago, evitando su uso desproporcionado."},

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildPool(){
  return BANK.map((q,k)=>{
    const idx=shuffle([0,1,2,3]);
    return{k,u:q.u,t:q.t,opts:idx.map(i=>q.o[i]),correct:idx.indexOf(q.c),e:q.e};
  });
}
let pool=buildPool();
const UNAMES={1:"Lunes · T54 Control/IGAE",2:"Martes · T57 Ingresos/Tributos",3:"Miércoles · T58 Retribuciones",4:"Jue-Vie · Repaso BVI completo"};
const SK="gace_bvi_s2_v1";
let state={unit:0,mode:"all"};
let db=(()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{records:{}};}catch(e){return{records:{}};}})();
function save(){try{localStorage.setItem(SK,JSON.stringify(db));}catch(e){}}
function rec(k){if(!db.records[k])db.records[k]={ok:0,fail:0};return db.records[k];}
function pct(k){const r=rec(k),t=r.ok+r.fail;return t===0?-1:Math.round(r.ok/t*100);}
function ustat(u){
  const idxs=pool.filter(p=>p.u===u).map(p=>p.k);
  let ok=0,fail=0;
  idxs.forEach(k=>{const r=rec(k);ok+=r.ok;fail+=r.fail;});
  const ans=idxs.filter(k=>rec(k).ok+rec(k).fail>0).length;
  return{total:idxs.length,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):-1};
}
function gstat(){
  let ok=0,fail=0,ans=0;
  pool.forEach(p=>{const r=rec(p.k);ok+=r.ok;fail+=r.fail;if(r.ok+r.fail>0)ans++;});
  return{total:pool.length,ok,fail,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):0};
}
function adaptive(unit){
  let items=unit>0?pool.filter(p=>p.u===unit):pool;
  return items.map(p=>{
    const r=rec(p.k),t=r.ok+r.fail;
    let w=t===0?2:(r.ok/t<0.5?4:r.ok/t<0.75?3:r.ok/t<1?2:0.3);
    return{...p,w};
  }).sort((a,b)=>b.w-a.w).slice(0,20);
}
function filtered(){
  let items=state.unit>0?pool.filter(p=>p.u===state.unit):pool;
  if(state.mode==="fail")items=items.filter(p=>rec(p.k).fail>0);
  if(state.mode==="adaptive")items=adaptive(state.unit);
  return items;
}
function renderNav(){
  const DNAMES={1:"Lun·T54",2:"Mar·T57",3:"Mié·T58",4:"Jue-Vie·Repaso"};
  const tabs=[{v:0,l:"Toda la semana"},...[1,2,3,4].map(u=>({v:u,l:DNAMES[u]}))];
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb${state.unit==t.v?" active":""}" onclick="setUnit(${t.v})">${t.l}</button>`).join("")
    +`<button class="nb${state.mode==="adaptive"?" active":""}" style="margin-left:auto" onclick="setMode('adaptive')">🎯 Adaptativo</button>`;
}
function renderStats(){
  const g=gstat();
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-n">${g.answered}/${g.total}</div><div class="stat-l">Respondidas</div></div>
    <div class="stat"><div class="stat-n" style="color:#0f6e56">${g.ok}</div><div class="stat-l">Correctas</div></div>
    <div class="stat"><div class="stat-n" style="color:#a32d2d">${g.fail}</div><div class="stat-l">Erróneas</div></div>
    <div class="stat"><div class="stat-n">${g.pct}%</div><div class="stat-l">% acierto</div></div>`;
  document.getElementById("prog").style.width=g.pct+"%";
}
function renderUBars(){
  document.getElementById("ubars").innerHTML=[1,2,3,4].map(u=>{
    const s=ustat(u);
    const p=s.pct<0?0:s.pct;
    const col=s.pct<0?"#b4b2a9":s.pct<50?"#e24b4a":s.pct<75?"#ef9f27":"#1d9e75";
    return`<div class="ubar" onclick="setUnit(${u})"><div class="ubar-title">${UNAMES[u]}</div><div class="ubar-track"><div class="ubar-fill" style="width:${p}%;background:${col}"></div></div><div class="ubar-pct">${s.pct<0?"sin datos":s.pct+"%"} · ${s.answered}/${s.total}</div></div>`;
  }).join("");
}
function renderCtrl(){
  document.getElementById("ctrl").innerHTML=`
    <button class="btn${state.mode==="all"?" active":""}" onclick="setMode('all')">Todas</button>
    <button class="btn${state.mode==="fail"?" active":""}" onclick="setMode('fail')">Solo erróneas</button>
    <button class="btn${state.mode==="adaptive"?" active":""}" onclick="setMode('adaptive')">🎯 Top 20 adaptativo</button>
    <button class="btn" onclick="reShuf()" title="Rebarajar opciones">🔀 Barajar</button>
    <button class="btn danger" onclick="if(confirm('¿Borrar todo el historial?')){db={records:{}};save();renderAll()}" style="margin-left:auto">Reiniciar</button>`;
}
function renderQuestions(){
  const items=filtered();
  if(!items.length){document.getElementById("questions").innerHTML=`<div class="empty">No hay preguntas en este filtro.</div>`;return;}
  let prev=null,html="";
  items.forEach(p=>{
    if(state.unit===0&&p.u!==prev){html+=`<div class="sep">${UNAMES[p.u]}</div>`;prev=p.u;}
    const r=rec(p.k),pc=pct(p.k);
    const badge=pc<0?"":
      `<span class="qpct" style="background:${pc>=75?"#eaf3de":pc>=50?"#faeeda":"#fcebeb"};color:${pc>=75?"#0f6e56":pc>=50?"#854f0b":"#a32d2d"}">${pc}% (${r.ok+r.fail}v)</span>`;
    html+=`<div class="qcard" id="qc-${p.k}">
      <div class="qhead"><span class="qbadge">${UNAMES[p.u]}</span><div class="qmeta">${badge}<span class="qnum">#${p.k+1}</span></div></div>
      <div class="qtext">${p.t}</div>
      <div class="opts">${p.opts.map((o,i)=>`<button class="opt" id="o-${p.k}-${i}" onclick="answer(${p.k},${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join("")}</div>
      <div id="ex-${p.k}"></div>
    </div>`;
  });
  document.getElementById("questions").innerHTML=html;
}
function answer(k,chosen){
  const p=pool[k],ok=chosen===p.correct,r=rec(k);
  if(ok)r.ok++;else r.fail++;
  save();
  document.getElementById("qc-"+k).classList.add(ok?"ok":"fail");
  for(let i=0;i<p.opts.length;i++){
    const b=document.getElementById("o-"+k+"-"+i);
    b.disabled=true;
    if(i===p.correct)b.classList.add("c-ok");
    if(i===chosen&&!ok)b.classList.add("c-fail");
  }
  document.getElementById("ex-"+k).innerHTML=`<div class="exp"><strong style="color:${ok?"#0f6e56":"#a32d2d"}">${ok?"✓ Correcto":"✗ Incorrecto"}</strong> ${p.e}</div>`;
  renderStats();renderUBars();
}
function setUnit(u){state.unit=parseInt(u);if(state.mode!=="adaptive")state.mode="all";renderAll();}
function setMode(m){state.mode=m;renderCtrl();renderQuestions();}
function reShuf(){pool=buildPool();renderAll();}
function renderAll(){renderNav();renderStats();renderUBars();renderCtrl();renderQuestions();}
renderAll();
</script>
