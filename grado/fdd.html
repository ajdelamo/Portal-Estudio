// ── STATE ──────────────────────────────────────────────────────────────────
let history = {};
let queue = [];
let qIdx = 0;
let filter = 'all';
let sessionCorrect = 0, sessionTotal = 0;
const UNITS = [1,2,3,4,5,6];
const UNIT_NAMES = ['UD1·Concepto','UD2·Fuentes','UD3·Interpretación','UD4·Conceptos','UD5·Justicia','UD6·Actualidad'];

function loadHistory() {
  try { history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { history = {}; }
}
function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function getStats() {
  let total=0, ok=0, fail=0;
  ALL_QUESTIONS.forEach(q => {
    const h = history[q.id];
    if (h) { total += h.attempts; ok += h.correct; fail += h.attempts - h.correct; }
  });
  return {total, ok, fail, pct: total ? Math.round(ok/total*100) : null};
}

function getUnitStats(u) {
  const qs = ALL_QUESTIONS.filter(q => q.unit === u);
  let attempts=0, correct=0;
  qs.forEach(q => { const h=history[q.id]; if(h){ attempts+=h.attempts; correct+=h.correct; }});
  return {attempts, correct, total: qs.length};
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildQueue() {
  if (filter === 'all') {
    queue = shuffle([...ALL_QUESTIONS]);
  } else if (filter === 'wrong') {
    queue = shuffle(ALL_QUESTIONS.filter(q => {
      const h = history[q.id];
      return h && h.attempts > 0 && (h.correct / h.attempts) < 1;
    }));
  } else if (filter === 'top20') {
    const scored = ALL_QUESTIONS.map(q => {
      const h = history[q.id];
      const rate = h && h.attempts > 0 ? 1 - (h.correct/h.attempts) : 0.5;
      const weight = rate + 0.1 * Math.random();
      return { q, weight };
    });
    scored.sort((a,b) => b.weight - a.weight);
    queue = scored.slice(0,20).map(x => x.q);
    shuffle(queue);
  }
  qIdx = 0;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildQueue();
  renderQuestion();
}

function shuffleQueue() {
  buildQueue();
  renderQuestion();
}

function confirmReset() {
  if (confirm('¿Resetear todo el historial de respuestas? Esta acción no se puede deshacer.')) {
    history = {};
    saveHistory();
    sessionCorrect = 0; sessionTotal = 0;
    updateStats();
    renderUnitBars();
    buildQueue();
    renderQuestion();
  }
}

function updateStats() {
  const s = getStats();
  document.getElementById('s-total').textContent = s.total;
  document.getElementById('s-ok').textContent = s.ok;
  document.getElementById('s-fail').textContent = s.fail;
  document.getElementById('s-pct').textContent = s.pct !== null ? s.pct+'%' : '—';
}

function renderUnitBars() {
  const c = document.getElementById('unit-bars');
  c.innerHTML = UNITS.map((u,i) => {
    const s = getUnitStats(u);
    const pct = s.attempts > 0 ? Math.round(s.correct/s.attempts*100) : null;
    const cls = pct === null ? '' : pct >= 75 ? 'good' : pct >= 50 ? 'warn' : 'bad';
    const w = s.attempts > 0 ? Math.round(s.correct/s.attempts*100) : 0;
    return `<div class="unit-bar">
      <div class="label"><span>${UNIT_NAMES[i]}</span><span>${pct !== null ? pct+'%' : '—'}</span></div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${w}%"></div></div>
    </div>`;
  }).join('');
}

function renderQuestion() {
  const container = document.getElementById('q-container');
  if (!queue.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No hay preguntas en este filtro todavía.<br>Responde más preguntas o selecciona "Todas".</p></div>`;
    return;
  }
  if (qIdx >= queue.length) {
    showScore();
    return;
  }
  const q = queue[qIdx];
  const h = history[q.id];
  const errorRate = h && h.attempts > 0 ? 1 - (h.correct/h.attempts) : null;
  const isHot = errorRate !== null && errorRate >= 0.5;

  // Shuffle options with Fisher-Yates, keeping track of correct index
  const indices = [0,1,2,3];
  shuffle(indices);
  const shuffledOpts = indices.map(i => q.opts[i]);
  const correctShuffled = indices.indexOf(q.ans);

  const attemptTxt = h && h.attempts > 0
    ? `${h.attempts} intento${h.attempts>1?'s':''} · ${Math.round(h.correct/h.attempts*100)}% acierto`
    : 'Sin intentos';

  container.innerHTML = `
    <div class="card">
      <div class="card-meta">
        <span class="badge">${UNIT_NAMES[q.unit-1]}</span>
        <span class="badge ${isHot?'hot':''}">${isHot?'🔥 ':''}${attemptTxt}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${shuffledOpts.map((o,i) => `<button class="opt" onclick="answer(${i},${correctShuffled},'${q.id}',this)">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav-row">
        <span class="progress-text">${qIdx+1} / ${queue.length}</span>
        <button id="next-btn" style="display:none" onclick="nextQuestion()">Siguiente →</button>
      </div>
    </div>`;
}

function answer(chosen, correct, qid, btn) {
  const opts = document.querySelectorAll('.opt');
  opts.forEach(b => b.disabled = true);
  const q = ALL_QUESTIONS.find(x => x.id === qid);
  const isCorrect = chosen === correct;

  if (!history[qid]) history[qid] = {attempts:0, correct:0};
  history[qid].attempts++;
  if (isCorrect) history[qid].correct++;
  saveHistory();
  sessionTotal++;
  if (isCorrect) sessionCorrect++;
  updateStats();
  renderUnitBars();

  opts[chosen].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) opts[correct].classList.add('reveal');

  const fb = document.getElementById('fb');
  fb.className = `feedback show ${isCorrect ? 'ok' : 'fail'}`;
  fb.innerHTML = `<strong>${isCorrect ? '✓ Correcto' : '✗ Incorrecto'}</strong> — ${q.exp}`;

  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuestion() {
  qIdx++;
  renderQuestion();
}

function showScore() {
  const pct = sessionTotal > 0 ? Math.round(sessionCorrect/sessionTotal*100) : 0;
  document.getElementById('score-val').textContent = pct + '%';
  document.getElementById('score-msg').textContent =
    `${sessionCorrect} correctas de ${sessionTotal} en esta sesión. ${
      pct >= 80 ? '¡Excelente trabajo!' : pct >= 60 ? 'Buen progreso, sigue repasando.' : 'Hay margen de mejora. Usa el filtro de erróneas.'}`;
  document.getElementById('score-popup').classList.add('show');
  sessionCorrect = 0; sessionTotal = 0;
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadHistory();
updateStats();
renderUnitBars();
buildQueue();
renderQuestion();
</script>
