<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDD · Test Adaptativo</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #4fc3a1;
    --danger: #e05c6a;
    --success: #4fc3a1;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #6060780;
    --font: 'Georgia', serif;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 1.1rem; font-weight: normal; letter-spacing: 0.05em; color: #b0b0d0; }
  header h1 span { color: var(--accent); font-weight: bold; }

  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    font-size: 0.78rem; color: var(--text2);
  }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat .val { font-size: 1.1rem; color: var(--text); font-weight: bold; }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 0.82rem;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.active { background: var(--accent); border-color: var(--accent); color: white; }
  button.danger { border-color: var(--danger); }
  button.danger:hover { background: var(--danger); color: white; }

  .unit-progress {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .unit-bar { font-size: 0.72rem; color: var(--text2); }
  .unit-bar .label { margin-bottom: 3px; display: flex; justify-content: space-between; }
  .bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .bar-fill.good { background: var(--success); }
  .bar-fill.warn { background: #f0a500; }
  .bar-fill.bad { background: var(--danger); }

  main { max-width: 780px; margin: 0 auto; padding: 28px 20px 60px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px 24px;
    margin-bottom: 20px;
  }
  .card-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--text2);
  }
  .badge.hot { border-color: var(--danger); color: var(--danger); }
  .q-text {
    font-size: 1.02rem;
    line-height: 1.65;
    margin-bottom: 22px;
    color: var(--text);
  }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 8px;
    padding: 11px 16px;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1.5;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    color: var(--text);
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: #22223a; }
  .opt:disabled { cursor: default; }
  .opt.correct { border-color: var(--success); background: #1a3530; color: #8ef0d0; }
  .opt.wrong { border-color: var(--danger); background: #301a20; color: #f09090; }
  .opt.reveal { border-color: var(--success); background: #1a2e28; color: #8ef0d0; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #15302a; border: 1px solid #2e6a56; color: #9ff0d0; }
  .feedback.fail { background: #2e1520; border: 1px solid #6a2e38; color: #f0a0a8; }

  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 22px;
  }
  .progress-text { font-size: 0.8rem; color: var(--text2); font-family: var(--mono); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 0.95rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  .score-popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .score-popup.show { display: flex; }
  .score-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 36px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
  }
  .score-box h2 { color: var(--accent); margin-bottom: 10px; font-size: 1.4rem; }
  .score-big { font-size: 3rem; font-weight: bold; margin: 16px 0; }
  .score-box p { color: var(--text2); font-size: 0.88rem; margin-bottom: 20px; }

  @media (max-width: 600px) {
    .card { padding: 18px 16px; }
    header { padding: 14px 16px; }
    .controls { padding: 10px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1><span>FDD</span> · Filosofía y Teoría del Derecho · Test Adaptativo</h1>
  <div class="stats-bar">
    <div class="stat"><span class="val" id="s-total">0</span><span>respondidas</span></div>
    <div class="stat"><span class="val" id="s-ok">0</span><span>correctas</span></div>
    <div class="stat"><span class="val" id="s-fail">0</span><span>erróneas</span></div>
    <div class="stat"><span class="val" id="s-pct">—</span><span>% acierto</span></div>
  </div>
</header>

<div class="controls">
  <button class="active" onclick="setFilter('all',this)">Todas</button>
  <button onclick="setFilter('wrong',this)">Solo erróneas</button>
  <button onclick="setFilter('top20',this)">🎯 Top 20 adaptativo</button>
  <button onclick="shuffleQueue()">🔀 Barajar</button>
  <button class="danger" onclick="confirmReset()">↺ Resetear historial</button>
</div>

<div class="unit-progress" id="unit-bars"></div>

<main id="main-area">
  <div id="q-container"></div>
</main>

<div class="score-popup" id="score-popup">
  <div class="score-box">
    <h2>Sesión completada</h2>
    <div class="score-big" id="score-val">—</div>
    <p id="score-msg"></p>
    <button onclick="document.getElementById('score-popup').classList.remove('show'); setFilter('all', document.querySelector('.controls button'))">Continuar</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'fdd_v2';

const ALL_QUESTIONS = [
// ── UD1 · CONCEPTO DE DERECHO ──────────────────────────────────────────────
{id:'u1_01', unit:1, q:'¿Cuál de las siguientes proposiciones describe con mayor precisión la "polisemia" del término "derecho"?',
 opts:['El término puede significar derecho objetivo, derecho subjetivo y ciencia del derecho, entre otras acepciones, dependiendo del contexto de uso','El término siempre alude a un conjunto de normas coercitivas emitidas por el Estado, independientemente del contexto en que se emplee','La polisemia es un defecto técnico que los sistemas jurídicos modernos han superado mediante definiciones legislativas precisas','El término designa exclusivamente la facultad reconocida al individuo para exigir determinada conducta de otro sujeto'],
 ans:0, exp:'La polisemia del término "derecho" refleja sus múltiples significados: como sistema normativo (objetivo), como facultad individual (subjetivo) y como disciplina científica. Ninguna de esas acepciones es la "única" ni han sido eliminadas por definición legal.'},

{id:'u1_02', unit:1, q:'La distinción entre "derecho objetivo" y "derecho subjetivo" puede formularse correctamente así:',
 opts:['El derecho objetivo es el ordenamiento normativo en su conjunto; el derecho subjetivo es la facultad o poder que ese ordenamiento reconoce a los individuos','El derecho objetivo es la norma positiva estatal; el derecho subjetivo es cualquier norma moral no recogida formalmente','El derecho objetivo es la facultad del individuo; el derecho subjetivo es el sistema de normas que regula la convivencia social','El derecho objetivo se identifica con el derecho natural; el derecho subjetivo, con el derecho positivo'],
 ans:0, exp:'El derecho objetivo designa el ordenamiento como conjunto normativo ("ius"); el derecho subjetivo, la facultad que ese ordenamiento atribuye al sujeto ("facultas agendi"). La confusión entre ambos y con otras dicotomías (natural/positivo) es el error más frecuente.'},

{id:'u1_03', unit:1, q:'Según la teoría tridimensional de Miguel Reale, el derecho se compone de tres dimensiones inseparables. ¿Cuáles son?',
 opts:['Hecho social, valor (especialmente justicia) y norma','Coerción, legitimidad y eficacia','Texto legal, aplicación judicial y doctrina científica','Sujeto, objeto y relación jurídica'],
 ans:0, exp:'Reale propone que el derecho integra siempre un hecho social, un valor —principalmente la justicia— y una norma que los articula. Las otras tríadas pertenecen a distintas teorías o disciplinas.'},

{id:'u1_04', unit:1, q:'El iusnaturalismo teológico medieval, representado por Tomás de Aquino, sostiene que:',
 opts:['La ley humana justa participa de la ley eterna a través de la ley natural, de modo que una ley injusta carece de obligatoriedad moral','La ley natural es un conjunto de principios racionales que el ser humano descubre mediante la razón, sin necesidad de referencia a Dios','La validez del derecho positivo depende exclusivamente de su promulgación formal por la autoridad legítima','El derecho natural y el derecho positivo son órdenes completamente separados sin ninguna relación jerárquica'],
 ans:0, exp:'En el esquema tomasiano hay una jerarquía: ley eterna → ley natural (participación racional en la ley eterna) → ley humana. Una ley humana contraria a la ley natural no obliga moralmente. La segunda opción describe más bien el iusnaturalismo racionalista moderno.'},

{id:'u1_05', unit:1, q:'El iusnaturalismo racionalista moderno, a diferencia del teológico medieval, fundamenta el derecho natural en:',
 opts:['La razón humana autónoma, sin necesidad de remisión a la voluntad divina','La tradición histórica y los usos consolidados de cada comunidad política','La eficacia de las normas para producir consecuencias sociales beneficiosas','La autoridad soberana que garantiza la paz social mediante el monopolio de la coerción'],
 ans:0, exp:'El iusnaturalismo racionalista (Grotius, Pufendorf, Locke) emancipa el derecho natural de la teología y lo asienta en la razón humana. La segunda opción evoca el historicismo jurídico; la cuarta, a Hobbes/positivismo.'},

{id:'u1_06', unit:1, q:'El positivismo jurídico en su versión de "estatalización del derecho" defiende que:',
 opts:['Solo el derecho producido o reconocido por el Estado es derecho en sentido estricto, excluyendo el derecho consuetudinario autónomo y el derecho natural','El Estado surge históricamente del derecho, por lo que el derecho precede lógicamente al Estado','El derecho positivo es válido siempre que sea justo, con independencia de su origen estatal','La costumbre popular constituye la fuente más importante del ordenamiento jurídico'],
 ans:0, exp:'La versión estatalizante del positivismo identifica derecho con derecho estatal. El historicismo jurídico (Savigny) defiende precisamente lo contrario: que el derecho brota del espíritu del pueblo antes que del Estado.'},

{id:'u1_07', unit:1, q:'La Grundnorm o norma fundamental en la teoría pura del derecho de Kelsen:',
 opts:['Es una norma hipotética, no positiva, que fundamenta la validez de toda la pirámide normativa sin ser ella misma validada por ninguna norma superior','Es la Constitución escrita, norma positiva suprema que da validez a todas las demás','Es una norma moral de justicia que legitima el ordenamiento ante la conciencia ciudadana','Es la norma consuetudinaria originaria que históricamente dio lugar al primer texto constitucional'],
 ans:0, exp:'Kelsen distingue con precisión: la Grundnorm es hipotética y presupuesta, no positiva. La Constitución es la norma positiva suprema, pero su propia validez remite a la Grundnorm. Confundir ambas es el error canónico.'},

{id:'u1_08', unit:1, q:'¿Cuál es la diferencia principal entre el realismo jurídico americano y el escandinavo?',
 opts:['El realismo americano es predominantemente empírico y se centra en predecir la conducta de los jueces; el escandinavo tiene una base filosófica más analítica y cuestiona el estatus ontológico de los conceptos jurídicos','El realismo americano niega la existencia de derechos subjetivos; el escandinavo los reconoce pero los subordina a la eficacia social','El realismo escandinavo defiende que el derecho es solo una proyección de la moral social; el americano lo reduce a normas estatales coercitivas','El realismo americano se desarrolló en el continente europeo; el escandinavo, en el contexto del common law anglosajón'],
 ans:0, exp:'Holmes, Frank y Llewellyn (americanos) enfatizan la predicción de conductas judiciales. Hägerström, Ross y Olivecrona (escandinavos) atacan filosóficamente los conceptos jurídicos como entidades metafísicas sin referente empírico real.'},

{id:'u1_09', unit:1, q:'La jurisprudencia de intereses de Philipp Heck propone que el juez debe:',
 opts:['Investigar los intereses en conflicto que el legislador pretendió regular y resolver el caso de forma que satisfaga esos intereses del modo más coherente con la ley','Aplicar el texto legal de forma estrictamente literal, sin atender a ninguna consideración de oportunidad o utilidad social','Crear libremente la norma aplicable al caso concreto cuando la ley sea insuficiente, sin vinculación al texto ni a la intención del legislador','Ponderar los principios constitucionales en conflicto con total independencia de la letra de la ley ordinaria'],
 ans:0, exp:'Heck critica tanto el formalismo conceptualista como el movimiento del derecho libre. Su propuesta es que el juez reconstruya los intereses que el legislador quiso equilibrar y los satisfaga conforme al texto legal. La tercera opción describe el movimiento del derecho libre.'},

{id:'u1_10', unit:1, q:'El movimiento del "derecho libre" (Freirechtsschule), a diferencia de la jurisprudencia de intereses, defiende:',
 opts:['Que el juez puede crear derecho con plena libertad cuando la ley es insuficiente o injusta, sin estar vinculado a la intención legislativa','Que la interpretación jurídica debe ajustarse estrictamente al sentido gramatical del texto normativo','Que el juez está subordinado al legislador y su función se limita a aplicar mecánicamente la norma existente','Que el derecho debe surgir exclusivamente de la costumbre popular y no de la producción legislativa estatal'],
 ans:0, exp:'La Freirechtsschule (Kantorowicz, Ehrlich) reivindica una amplia libertad creadora del juez. La jurisprudencia de intereses (Heck) coincide en criticar el conceptualismo pero rechaza esa libertad ilimitada, vinculando la decisión a los intereses del legislador.'},

{id:'u1_11', unit:1, q:'El pospositivismo jurídico —corriente representada, entre otros, por Dworkin y Alexy— se distingue del positivismo principalmente porque:',
 opts:['Integra principios morales en el concepto de derecho, de modo que la validez jurídica no puede separarse completamente de la corrección moral','Niega cualquier relevancia a las normas positivas y defiende que el derecho es solo un conjunto de valores morales','Coincide con el positivismo en separar derecho y moral, pero añade una teoría de la argumentación como complemento','Reduce el derecho a las decisiones efectivas de los jueces, prescindiendo de normas y principios abstractos'],
 ans:0, exp:'El pospositivismo sostiene que el derecho no puede identificarse prescindiendo de los principios morales que le dan coherencia. No niega las normas positivas (como haría un iusnaturalismo radical), sino que rechaza la separación tajante derecho-moral propia del positivismo.'},

{id:'u1_12', unit:1, q:'Entre las funciones sociales del derecho, la función de "control social" se distingue de la función de "integración social" en que:',
 opts:['El control social regula y limita conductas para mantener el orden establecido; la integración social cohesiona al grupo en torno a valores e identidades comunes','El control social produce normas escritas; la integración social actúa solo a través de la costumbre y los usos','La función de control social es exclusiva del derecho público; la de integración, del derecho privado','El control social es una función histórica superada; la integración social es la función dominante en los sistemas jurídicos contemporáneos'],
 ans:0, exp:'El control social (limitar conductas desviadas) y la integración social (cohesión grupal en torno a valores) son funciones analíticamente distintas, aunque complementarias. Ambas pueden operar mediante normas escritas y consuetudinarias, en ámbitos públicos y privados.'},

{id:'u1_13', unit:1, q:'Las técnicas de control social "promocionales" se distinguen de las "represivas" en que:',
 opts:['Las promocionales incentivan conductas deseables mediante premios o ventajas; las represivas disuaden conductas indeseables mediante sanciones negativas','Las promocionales actúan antes de que se produzca la conducta; las represivas, únicamente después de producida la infracción','Las promocionales son propias del derecho privado; las represivas, exclusivamente del derecho penal','Las represivas corresponden al Estado; las promocionales, a organismos internacionales o supranacionales'],
 ans:0, exp:'La distinción clásica (Bobbio) es por el tipo de sanción: negativa/represiva (castigo por conducta indeseable) frente a positiva/promocional (incentivo por conducta deseable). La simultaneidad temporal o el ámbito público/privado no son el criterio diferenciador.'},

{id:'u1_14', unit:1, q:'El historicismo jurídico de Savigny considera que la fuente primaria del derecho es:',
 opts:['El Volksgeist, el espíritu del pueblo que se manifiesta espontáneamente en la costumbre y en el sentido jurídico de la comunidad','La voluntad soberana del Estado expresada en la ley formal promulgada por el Parlamento','La razón universal compartida por todos los seres humanos con independencia de su tradición histórica','La jurisprudencia de los tribunales superiores que aplican los principios generales del derecho'],
 ans:0, exp:'Savigny y la Escuela Histórica del Derecho reaccionan contra la codificación racionalista afirmando que el derecho brota del espíritu del pueblo (Volksgeist) y no de la voluntad legislativa abstracta. La segunda opción es la posición positivista estatalizante que Savigny combate.'},

{id:'u1_15', unit:1, q:'¿Cuál de las siguientes afirmaciones sobre el positivismo filosófico jurídico (Comte aplicado al derecho) es correcta?',
 opts:['Pretende estudiar el derecho como un fenómeno social empírico, aplicando el método de las ciencias naturales y renunciando a todo juicio de valor','Defiende que el derecho positivo debe ajustarse a los valores morales objetivos que la razón descubre','Sostiene que el único objeto de la ciencia jurídica son las decisiones históricas de los jueces, no las normas abstractas','Identifica derecho válido con derecho justo y rechaza toda norma que contradiga la moral social dominante'],
 ans:0, exp:'El positivismo filosófico (influjo de Comte) aplica al derecho el método científico-empírico: describe el derecho que es, no el que debe ser, y evita los juicios valorativos. La segunda y cuarta opciones son posiciones iusnaturalistas.'},

// ── UD2 · SISTEMA JURÍDICO Y FUENTES DEL DERECHO ──────────────────────────
{id:'u2_01', unit:2, q:'En la estructura de la norma jurídica, el "supuesto de hecho" y la "consecuencia jurídica" se relacionan de la siguiente manera:',
 opts:['El supuesto de hecho es la condición fáctica o jurídica cuya realización determina la aplicación de la consecuencia jurídica prevista','El supuesto de hecho es la sanción prevista por el ordenamiento; la consecuencia jurídica, el comportamiento exigido al sujeto','El supuesto de hecho describe la consecuencia favorable; la consecuencia jurídica, la reacción coercitiva del Estado','Ambos conceptos son sinónimos en la teoría kelseniana de la norma secundaria'],
 ans:0, exp:'La estructura clásica de la norma jurídica (primaria): dado el supuesto de hecho H → debe ser la consecuencia jurídica C. La inversión de términos es el error más común. Kelsen sitúa la coacción como consecuencia de la norma primaria, pero el esquema lógico es el mismo.'},

{id:'u2_02', unit:2, q:'Kelsen distingue entre sistemas jurídicos "estáticos" y "dinámicos". La diferencia principal radica en:',
 opts:['Los sistemas estáticos derivan la validez de las normas de su contenido material (conformidad con normas superiores de contenido); los dinámicos, del procedimiento formal de producción autorizado por norma superior','Los sistemas estáticos son propios de los estados federales; los dinámicos, de los estados unitarios','Los sistemas dinámicos son los que permiten la reforma constitucional; los estáticos, los que la prohíben','Los sistemas estáticos se rigen por la costumbre; los dinámicos, exclusivamente por la ley escrita'],
 ans:0, exp:'Para Kelsen, los sistemas morales son estáticos (validez por contenido); los jurídicos son dinámicos (validez por el procedimiento formal establecido en norma superior). No tiene que ver con la organización territorial ni con la rigidez constitucional.'},

{id:'u2_03', unit:2, q:'Una "antinomia" en sentido estricto existe cuando:',
 opts:['Dos normas válidas del mismo ordenamiento atribuyen consecuencias jurídicas incompatibles al mismo supuesto de hecho, de modo que no pueden cumplirse simultáneamente','Una norma tiene un contenido ambiguo que admite varias interpretaciones igualmente plausibles','Una norma regula una materia para la que no era competente el órgano que la dictó','Una norma carece de sanción y por ello no puede imponerse coercitivamente'],
 ans:0, exp:'La antinomia (Bobbio) requiere: misma materia, mismas condiciones de aplicación y consecuencias incompatibles. La ambigüedad es un problema interpretativo, no una antinomia. La incompetencia es un vicio de nulidad. La ausencia de sanción caracteriza a las leges imperfectae.'},

{id:'u2_04', unit:2, q:'La "prohibición de non liquet" recogida en el art. 1.7 del Código Civil español implica que:',
 opts:['Los jueces y tribunales tienen el deber de resolver todos los asuntos de su competencia, sin que puedan excusarse en silencio, oscuridad o insuficiencia de la ley','Los jueces pueden abstenerse de resolver cuando la ley no prevea expresamente el supuesto planteado','Solo el legislador puede colmar las lagunas del derecho; el juez debe esperar a que se dicte la norma aplicable','Los jueces están obligados a resolver únicamente cuando la ley sea clara, remitiendo al legislador los casos oscuros'],
 ans:0, exp:'El art. 1.7 CC establece la obligación de resolver: el juez no puede declarar "non liquet" (no está claro). Para hacerlo, el propio precepto habilita al juez a integrar el ordenamiento mediante analogía y principios generales del derecho.'},

{id:'u2_05', unit:2, q:'La analogía legis del art. 4.1 del Código Civil español requiere la concurrencia de cuatro elementos. ¿Cuál de los siguientes no es uno de ellos?',
 opts:['Que exista una norma constitucional que expresamente autorice la extensión analógica','Que exista una laguna legal (ausencia de norma aplicable al caso)','Que entre el caso regulado y el no regulado haya identidad de razón','Que el supuesto no esté excluido de la analogía por disposición legal'],
 ans:0, exp:'Los cuatro requisitos del art. 4.1 CC son: laguna legal, semejanza entre supuestos, identidad de razón, y que no sea materia excluida. No existe ningún requisito de autorización constitucional expresa para la analogía ordinaria.'},

{id:'u2_06', unit:2, q:'Las fuentes del derecho en el ordenamiento jurídico español, según el art. 1.1 del Código Civil, son:',
 opts:['La ley, la costumbre y los principios generales del derecho, en ese orden jerárquico','La ley, la jurisprudencia del Tribunal Supremo y la doctrina científica','La ley, los tratados internacionales y los principios generales del derecho','La Constitución, la ley orgánica y la ley ordinaria'],
 ans:0, exp:'El art. 1.1 CC enumera: ley, costumbre y principios generales del derecho, con ese orden de prelación. La jurisprudencia no es fuente del derecho sino complemento (art. 1.6 CC). Los tratados internacionales no figuran en el art. 1.1 CC como tales.'},

{id:'u2_07', unit:2, q:'Para que la costumbre sea fuente del derecho en el ordenamiento español, el art. 1.3 CC exige que reúna dos elementos. ¿Cuáles son?',
 opts:['Elemento material (uso repetido y constante) y elemento espiritual u opinio iuris (convicción de obligatoriedad jurídica)','Elemento material (uso escrito y documentado) y elemento formal (reconocimiento expreso por ley)','Elemento temporal (antigüedad mínima de diez años) y elemento territorial (vigencia en todo el territorio nacional)','Elemento subjetivo (voluntad de los afectados) y elemento objetivo (no contradicción con la ley escrita)'],
 ans:0, exp:'La costumbre jurídica exige uso material (longa consuetudo) y opinio iuris (convicción de que ese uso es jurídicamente obligatorio). No se requiere documentación escrita ni antigüedad mínima tasada; puede ser local. El no ser contra legem es un límite, no un elemento constitutivo.'},

{id:'u2_08', unit:2, q:'La jurisprudencia, en el sistema español, desempeña según el art. 1.6 CC el papel de:',
 opts:['Complemento del ordenamiento jurídico a través de la doctrina reiterada del Tribunal Supremo, sin ser fuente del derecho en sentido estricto','Fuente del derecho equiparable a la ley, vinculante para todos los órganos jurisdiccionales inferiores','Fuente subsidiaria que opera solo cuando la ley y la costumbre resultan inaplicables al caso concreto','Instrumento de derogación tácita de las leyes que el Tribunal Supremo declare contrarias a la Constitución'],
 ans:0, exp:'El art. 1.6 CC distingue cuidadosamente: la jurisprudencia "complementa" el ordenamiento pero no es fuente. Esto la diferencia de los sistemas de common law, donde el precedente judicial sí tiene fuerza de fuente vinculante.'},

{id:'u2_09', unit:2, q:'La distinción de Dworkin entre "normas" y "principios" en el debate con Hart se basa principalmente en:',
 opts:['Las normas se aplican en modo todo-o-nada (si se dan sus condiciones, se aplican; si no, no); los principios tienen una dimensión de peso o importancia que se pondera en casos de conflicto','Las normas son siempre escritas y tienen rango legal; los principios son siempre no escritos y de rango constitucional','Las normas obligan incondicionalmente; los principios solo obligan cuando han sido expresamente reconocidos por los tribunales','Las normas pertenecen al sistema jurídico positivo; los principios al sistema moral extrajurídico'],
 ans:0, exp:'Dworkin caracteriza la diferencia lógica: las normas funcionan como switch (on/off), mientras que los principios tienen peso (weight) que se pondera ante conflictos. No define la distinción por el soporte escrito ni por el rango normativo.'},

{id:'u2_10', unit:2, q:'La derogación "implícita" de una norma se produce cuando:',
 opts:['Una norma posterior regula de forma incompatible la misma materia, aunque no derogue expresamente la norma anterior','El Tribunal Constitucional declara inconstitucional una norma mediante sentencia estimatoria','El órgano que dictó la norma la sustituye por otra que regula la misma materia de forma idéntica','Una norma superior impone un plazo de vigencia a partir del cual la norma inferior pierde su eficacia'],
 ans:0, exp:'La derogación tácita o implícita opera por incompatibilidad sobrevenida entre norma nueva y antigua, sin que aquélla mencione expresamente a ésta. La declaración de inconstitucionalidad es un supuesto de nulidad, no de derogación en sentido estricto.'},

{id:'u2_11', unit:2, q:'En la clasificación de normas por razón de su sanción, una "lex perfecta" es aquella que:',
 opts:['Declara nulo el acto realizado en su contravención, de modo que produce su ineficacia jurídica','Sanciona la infracción con una pena pero no establece la nulidad del acto infractor','Carece de toda sanción y se limita a establecer un deber sin consecuencia jurídica por su incumplimiento','Permite la realización del acto y solo impone una compensación económica al perjudicado'],
 ans:0, exp:'La clasificación romana distingue: lex perfecta (nulidad del acto), lex plus quam perfecta (nulidad + pena), lex minus quam perfecta (pena sin nulidad), lex imperfecta (sin sanción). La ausencia total de sanción corresponde a la lex imperfecta.'},

{id:'u2_12', unit:2, q:'El argumento "a fortiori" en la interpretación jurídica puede formularse como:',
 opts:['Si la norma prevé una consecuencia para un supuesto de menor intensidad, con mayor razón debe aplicarse al supuesto de mayor intensidad que comparte la misma ratio','Si el legislador no reguló un supuesto, debe entenderse que quiso excluirlo de toda regulación jurídica','Si dos normas regulan supuestos semejantes con idéntica ratio, ambas deben aplicarse simultáneamente al caso no previsto','Si la norma general regula todos los casos, la norma especial debe interpretarse restrictivamente'],
 ans:0, exp:'El a fortiori (a maiori ad minus / a minori ad maius) traslada la consecuencia normativa al supuesto de mayor o menor intensidad por razón de coherencia. El argumento a contrario sensu es el que, ante el silencio del legislador, infiere exclusión. Son opuestos y confundirlos es el error clásico.'},

{id:'u2_13', unit:2, q:'Los cuatro ámbitos de validez de la norma jurídica que distingue Kelsen son:',
 opts:['Ámbito temporal, espacial, material y personal','Ámbito formal, sustantivo, procesal y ejecutivo','Ámbito subjetivo, objetivo, territorial y supranacional','Ámbito legislativo, judicial, administrativo y constitucional'],
 ans:0, exp:'Kelsen sistematiza la validez normativa en cuatro dimensiones: temporal (cuándo), espacial (dónde), material (qué conductas) y personal (a quiénes). La segunda, tercera y cuarta opciones no corresponden a la taxonomía kelseniana.'},

{id:'u2_14', unit:2, q:'Las "normas incompletas" se clasifican en tres categorías. ¿Cuál de las siguientes tríadas es correcta?',
 opts:['Normas de remisión, normas aclaratorias o interpretativas, y normas restrictivas o limitativas de otras normas','Normas programáticas, normas dispositivas y normas imperativas','Normas procesales, normas sustantivas y normas sancionadoras','Normas primarias, normas secundarias y normas terciarias'],
 ans:0, exp:'Las normas incompletas son aquellas que no pueden aplicarse por sí solas: las de remisión (reenvían a otro precepto), las aclaratorias/interpretativas (precisan el sentido de otras) y las restrictivas/limitativas (recortan el ámbito de otras). Las otras tríadas responden a otras clasificaciones.'},

{id:'u2_15', unit:2, q:'El criterio de resolución de antinomias denominado "de especialidad" opera de la siguiente manera:',
 opts:['La norma especial prevalece sobre la norma general aunque sean de igual rango y época, porque regula un supuesto particular con mayor precisión','La norma posterior prevalece sobre la norma anterior de igual rango, por cuanto expresa la voluntad legislativa más reciente','La norma de rango superior prevalece sobre la norma de rango inferior, con independencia de la fecha de promulgación','La norma que ofrece mayor protección al más débil prevalece sobre la norma que favorece a la parte más poderosa'],
 ans:0, exp:'Los criterios clásicos son: cronológico (lex posterior), jerárquico (lex superior) y de especialidad (lex specialis). El criterio de especialidad prescinde de la fecha y del rango: la norma que acota el supuesto con mayor especificidad desplaza a la general. Confundir estos tres criterios es el error más frecuente en este punto.'},

{id:'u2_16', unit:2, q:'El argumento "a contrario sensu" en la interpretación jurídica implica:',
 opts:['Que, si el legislador reguló expresamente cierto supuesto, los supuestos no mencionados deben recibir tratamiento opuesto o quedar excluidos de la norma','Que la norma aplicable al supuesto de mayor gravedad debe aplicarse también al de menor gravedad','Que una norma restrictiva de derechos debe interpretarse en el sentido más favorable al afectado','Que la norma especial solo se aplica en el territorio para el que fue dictada'],
 ans:0, exp:'El a contrario sensu infiere que lo no incluido expresamente queda excluido o recibe consecuencia inversa. Es el argumento opuesto al a fortiori y al analógico: donde uno amplía, el a contrario restringe. Su aplicación indiscriminada puede producir resultados injustos.'},

{id:'u2_17', unit:2, q:'La "costumbre praeter legem" es aquella que:',
 opts:['Regula supuestos no contemplados por la ley, completando el ordenamiento en materias no reguladas','Contradice directamente el contenido de la ley y por ello es invalida como fuente jurídica','Reproduce o confirma lo dispuesto en la ley escrita, sin añadir contenido normativo propio','Es posterior a la ley que deroga e implícitamente la modifica por cambio en los usos sociales'],
 ans:0, exp:'Se distinguen tres tipos de costumbre por su relación con la ley: secundum legem (confirma la ley), praeter legem (cubre lagunas), contra legem (contradice la ley, invalida en el derecho español según art. 1.3 CC). Confundir estos tres tipos es el error habitual.'},

{id:'u2_18', unit:2, q:'Los "principios generales del derecho" cumplen, según el art. 1.4 CC, una doble función en el ordenamiento español:',
 opts:['Actúan como fuente subsidiaria para colmar lagunas y, al mismo tiempo, como criterios de interpretación de las demás normas','Son fuente primaria del ordenamiento con rango superior a la ley y criterio exclusivo de validez constitucional','Operan únicamente como herramienta de integración analógica, pero no tienen función interpretativa directa','Sirven solo para orientar al legislador en la producción normativa, sin aplicación directa por los jueces'],
 ans:0, exp:'Los principios generales tienen función integradora (fuente subsidiaria, art. 1.4 CC) e informadora del ordenamiento (criterio interpretativo). No tienen rango superior a la ley ordinaria en el sistema español de fuentes, a diferencia de los principios constitucionales.'},

// ── UD3 · INTERPRETACIÓN Y APLICACIÓN DEL DERECHO ─────────────────────────
{id:'u3_01', unit:3, q:'El art. 3.1 del Código Civil español establece que las normas se interpretarán según varios criterios. ¿Cuál de las siguientes listas los recoge correctamente?',
 opts:['Criterio gramatical, histórico, sistemático, lógico-teleológico y conforme a la realidad social del tiempo','Criterio literal, jerárquico, cronológico, teleológico y de especialidad','Criterio gramatical, analógico, sistemático, auténtico y jurisprudencial','Criterio histórico, sociológico, axiológico, lógico y conforme a la Constitución'],
 ans:0, exp:'El art. 3.1 CC enumera: sentido propio de las palabras (gramatical), antecedentes históricos y legislativos (histórico), contexto (sistemático), espíritu y finalidad (lógico-teleológico) y realidad social del tiempo de aplicación (sociológico). El criterio de realidad social es el más olvidado.'},

{id:'u3_02', unit:3, q:'La teoría "subjetiva" de la interpretación jurídica sostiene que el intérprete debe buscar:',
 opts:['La voluntad real del legislador histórico (voluntas legislatoris) que elaboró la norma','El sentido objetivo que la norma tiene en el momento actual de su aplicación','La interpretación más favorable a los derechos fundamentales del sujeto afectado','El significado que atribuirían a la norma sus destinatarios ordinarios, sin conocimiento jurídico especializado'],
 ans:0, exp:'La teoría subjetiva busca la voluntas legislatoris (intención histórica del legislador). La teoría objetiva busca la voluntas legis (voluntad de la ley, su sentido actual). La cuarta opción describe una variante de la teoría de la interpretación ordinaria, no la teoría subjetiva clásica.'},

{id:'u3_03', unit:3, q:'La máxima "in claris non fit interpretatio" ha sido criticada principalmente porque:',
 opts:['Presupone lo que habría que demostrar: que el texto es claro, siendo la claridad ya el resultado de un proceso interpretativo previo, no un punto de partida pre-interpretativo','Implica que los textos oscuros no deben interpretarse, dejando lagunas inaceptables en el ordenamiento','Contradice el principio de legalidad al autorizar al juez a crear derecho cuando la ley es imprecisa','Fue formulada en el derecho romano y carece de aplicabilidad en los ordenamientos jurídicos contemporáneos'],
 ans:0, exp:'La crítica fundamental es circular: para saber que un texto es "claro" ya hay que haberlo interpretado. La claridad es el resultado, no el presupuesto, de la interpretación. Las otras críticas son válidas en otros debates pero no capturan la objeción principal a esta máxima.'},

{id:'u3_04', unit:3, q:'La "interpretación conforme a la Constitución" como criterio hermenéutico supone que:',
 opts:['Entre las posibles interpretaciones de una norma legal, el intérprete debe preferir la que mejor se acomode al texto y al espíritu constitucional, descartando la inconstitucionalidad cuando sea evitable','El juez ordinario puede declarar inconstitucional cualquier norma legal que contradiga su interpretación de la Constitución','Solo el Tribunal Constitucional puede interpretar las normas ordinarias con arreglo a la Constitución','La interpretación conforme solo opera como criterio de última instancia, cuando todos los demás métodos del art. 3.1 CC hayan fallado'],
 ans:0, exp:'La interpretación conforme implica preferir, entre varias lecturas posibles de una ley, la constitucionalmente compatible. No implica que el juez ordinario declare inconstitucional la ley (eso es monopolio del TC en España), sino que salve la norma eligiendo la interpretación correcta.'},

{id:'u3_05', unit:3, q:'La teoría "clásica" de la aplicación del derecho (silogismo judicial) se diferencia de la posición kelseniana en que:',
 opts:['La teoría clásica concibe la aplicación como un proceso lógico-deductivo (subsunción del caso en la norma); Kelsen reconoce que la norma superior deja un "marco" de posibilidades y la aplicación supone un acto de voluntad dentro de ese marco','La teoría clásica reconoce la discrecionalidad judicial; Kelsen defiende que la solución correcta siempre puede obtenerse mediante lógica pura','La teoría clásica es propia del civil law; la teoría kelseniana, del common law anglosajón','Ambas coinciden en que la aplicación del derecho es un proceso puramente mecánico sin margen creativo'],
 ans:0, exp:'El positivismo clásico concibe la aplicación como subsunción lógica. Kelsen rompe con eso: la norma superior determina un "marco" (Rahmen) de soluciones posibles; dentro de él, el órgano aplicador actúa con voluntad (acto de voluntad, no de conocimiento). Esta es una distinción capital que suele invertirse.'},

{id:'u3_06', unit:3, q:'El principio "iura novit curia" significa que:',
 opts:['El tribunal conoce el derecho y no está vinculado por la calificación jurídica que las partes hagan de los hechos, aunque sí lo está por los hechos alegados','Las partes están obligadas a aportar la prueba del derecho aplicable, incluyendo el derecho extranjero en todo caso','El juez debe aplicar únicamente las normas que las partes hayan invocado expresamente en sus escritos','El tribunal puede apreciar hechos no alegados por las partes cuando el orden público esté comprometido'],
 ans:0, exp:'Iura novit curia: el juez conoce el derecho. Las partes alegan y prueban los hechos (da mihi factum, dabo tibi ius); el tribunal aplica el derecho que corresponda, incluso si las partes lo han calificado erróneamente. El derecho extranjero es una excepción: requiere prueba por las partes.'},

{id:'u3_07', unit:3, q:'Las "presunciones iuris et de iure" se distinguen de las "iuris tantum" en que:',
 opts:['Las iuris et de iure no admiten prueba en contrario; las iuris tantum sí pueden destruirse mediante prueba que demuestre que la presunción no se ajusta al caso concreto','Las iuris et de iure solo operan en derecho penal; las iuris tantum, en derecho civil y mercantil','Las iuris et de iure las establece el legislador; las iuris tantum las crea el juez para cada caso concreto','Las iuris et de iure son siempre favorables al acusado; las iuris tantum, siempre desfavorables'],
 ans:0, exp:'La distinción es clara: iuris et de iure = presunción absoluta, sin prueba en contrario posible; iuris tantum = presunción relativa, destructible por prueba contraria. La distribución por áreas de derecho o por origen legislativo/judicial no es el criterio diferenciador.'},

{id:'u3_08', unit:3, q:'Según el art. 3.2 del Código Civil, la equidad:',
 opts:['Solo puede fundar por sí sola una resolución judicial cuando la ley expresamente lo permita, siendo en los demás casos un criterio que debe ponderarse junto a la norma aplicable','Constituye una fuente del derecho de igual rango que la ley, aplicable siempre que la norma produzca un resultado manifiestamente injusto','Habilita al juez a prescindir de la norma aplicable en todos los casos en que su aplicación resulte desproporcionada','Sustituye a la analogía cuando no existe norma aplicable al supuesto de hecho planteado'],
 ans:0, exp:'El art. 3.2 CC establece una doble función de la equidad: criterio ponderativo en la aplicación (siempre) y fundamento exclusivo de la resolución (solo cuando la ley lo permita). No es fuente del derecho ni sustituye a la analogía.'},

{id:'u3_09', unit:3, q:'H.L.A. Hart distingue entre "casos fáciles" y "casos difíciles" (hard cases) en relación con:',
 opts:['La textura abierta del lenguaje jurídico, que genera un núcleo de certeza (casos claros) y una zona de penumbra (casos difíciles) donde el juez tiene discrecionalidad','La mayor o menor complejidad procesal del litigio y el número de partes implicadas','La distinción entre normas de conducta (casos fáciles) y normas de adjudicación (casos difíciles)','La distinción entre el derecho nacional (casos fáciles) y el derecho internacional (casos difíciles)'],
 ans:0, exp:'Hart sitúa el problema en la "open texture" del lenguaje: los términos legales tienen un núcleo semántico claro y una penumbra de incertidumbre. En la penumbra (casos difíciles), el juez ejerce discreción. Dworkin responde que no hay verdadera discreción porque los principios siempre ofrecen una respuesta correcta.'},

{id:'u3_10', unit:3, q:'Las cuatro fases del proceso probatorio, en el orden correcto, son:',
 opts:['Proposición (ofrecimiento de los medios de prueba), admisión (decisión judicial sobre pertinencia), práctica (realización efectiva de las pruebas) y valoración (apreciación del resultado)','Investigación, proposición, contradicción y sentencia','Alegación, admisión, debate y resolución','Descubrimiento, proposición, admisión y publicación'],
 ans:0, exp:'Las cuatro fases son: proposición → admisión → práctica → valoración. El orden es crucial: primero se proponen las pruebas, el juez admite las pertinentes, se practican y finalmente se valoran. Alterar el orden es el error frecuente.'},

{id:'u3_11', unit:3, q:'La "reducción al absurdo" como argumento interpretativo consiste en:',
 opts:['Rechazar una interpretación posible de la norma porque conduce a consecuencias lógicamente contradictorias o absurdas, lo que sirve para excluir esa interpretación','Ampliar el ámbito de la norma a supuestos no previstos cuando su exclusión produciría un resultado inequitativo','Aplicar la norma más general cuando la norma especial produce resultados absurdos en el caso concreto','Interpretar la norma en el sentido más desfavorable para demostrar que el resultado contrario es preferible'],
 ans:0, exp:'La reductio ad absurdum es un argumento por exclusión: si una interpretación conduce al absurdo, debe descartarse y elegirse la alternativa. No es un argumento extensivo ni supone aplicar la norma general sobre la especial.'},

{id:'u3_12', unit:3, q:'La "interpretación auténtica" es aquella que proviene de:',
 opts:['El propio órgano que dictó la norma, que la aclara o precisa mediante otra norma posterior del mismo rango','Los tribunales superiores mediante jurisprudencia reiterada y vinculante','Los órganos académicos o científicos que elaboran comentarios doctrinales oficialmente reconocidos','La costumbre interpretativa consolidada entre los operadores jurídicos de una determinada rama del derecho'],
 ans:0, exp:'La interpretación auténtica emana del mismo legislador u órgano autor de la norma, que la interpreta mediante otra disposición normativa. La interpretación judicial se llama usual o doctrinal; la de los académicos, doctrinal o científica.'},

// ── UD4 · CONCEPTOS JURÍDICOS FUNDAMENTALES ───────────────────────────────
{id:'u4_01', unit:4, q:'La distinción entre "capacidad jurídica" y "capacidad de obrar" puede formularse correctamente como:',
 opts:['La capacidad jurídica es la aptitud para ser titular de derechos y obligaciones (se tiene desde el nacimiento y es igual para todos); la capacidad de obrar es la aptitud para ejercer esos derechos por sí mismo (puede ser limitada)','La capacidad jurídica es la aptitud para actuar procesalmente; la capacidad de obrar, la aptitud para celebrar contratos','La capacidad jurídica desaparece con la mayoría de edad; la capacidad de obrar se adquiere en ese momento','Ambas son equivalentes en el ordenamiento español desde la reforma de la Ley 8/2021 sobre discapacidad'],
 ans:0, exp:'La distinción clásica: capacidad jurídica (personalidad, titularidad) = universal desde el nacimiento; capacidad de obrar (ejercicio autónomo) = graduable según edad y circunstancias. La Ley 8/2021 modifica el régimen de apoyos pero no elimina conceptualmente la distinción.'},

{id:'u4_02', unit:4, q:'De las tres teorías positivistas del derecho subjetivo, la de Ihering se distingue de la de Savigny en que:',
 opts:['Ihering define el derecho subjetivo como un interés jurídicamente protegido; Savigny lo define como un poder de la voluntad reconocido por el ordenamiento','Ihering niega la existencia de derechos subjetivos; Savigny los considera el núcleo del ordenamiento jurídico','Ihering los fundamenta en el derecho natural; Savigny, exclusivamente en el derecho positivo','Ihering considera que los derechos subjetivos solo existen en el derecho público; Savigny los circunscribe al derecho privado'],
 ans:0, exp:'La disputa clásica: Savigny = teoría de la voluntad (Willenstheorie); Ihering = teoría del interés (Interessentheorie). Kelsen niega utilidad al concepto como categoría independiente y lo reduce a la norma que protege un determinado comportamiento. Confundir Savigny e Ihering invierte la dirección de la crítica histórica.'},

{id:'u4_03', unit:4, q:'La distinción entre "dolo" y "culpa" en el derecho de la responsabilidad civil se basa en:',
 opts:['El dolo requiere intención de causar el daño; la culpa consiste en la falta de diligencia debida sin intención de dañar','El dolo es exclusivo del derecho penal; la culpa, del derecho civil','El dolo admite exoneración probando caso fortuito; la culpa, no','El dolo genera responsabilidad objetiva; la culpa, responsabilidad subjetiva agravada'],
 ans:0, exp:'Dolo = intención (voluntad directa de causar el resultado dañoso). Culpa = negligencia, imprudencia (falta de cuidado sin voluntad de dañar). Ambos pueden fundar responsabilidad civil. El caso fortuito exonera en ambos regímenes salvo pacto o ley especial.'},

{id:'u4_04', unit:4, q:'La responsabilidad civil "objetiva" o "sin culpa" se distingue de la responsabilidad subjetiva en que:',
 opts:['La responsabilidad objetiva prescinde de la culpa del agente: basta acreditar el daño, el nexo causal y que se realizó la actividad riesgosa legalmente prevista','La responsabilidad objetiva requiere dolo; la subjetiva, solo culpa leve','La responsabilidad objetiva es siempre contractual; la subjetiva, siempre extracontractual','La responsabilidad objetiva solo opera en el derecho administrativo; la subjetiva, en el derecho privado'],
 ans:0, exp:'La responsabilidad objetiva (riesgo) no requiere probar culpa: quien realiza la actividad peligrosa responde aunque haya actuado con toda diligencia. La subjetiva (culposa) exige probar negligencia o dolo. Ambas pueden ser contractuales o extracontractuales.'},

{id:'u4_05', unit:4, q:'La concepción "dualista" de la ley, asociada a Laband, distingue entre:',
 opts:['Ley en sentido formal (acto aprobado por el Parlamento con ese nombre) y ley en sentido material (norma jurídica general y abstracta con independencia de su origen)','Ley natural (principios morales universales) y ley positiva (norma dictada por el poder soberano)','Ley pública (que regula relaciones con el Estado) y ley privada (que regula relaciones entre particulares)','Ley primaria (constitucional) y ley secundaria (ordinaria o reglamentaria)'],
 ans:0, exp:'Laband introduce la distinción formal/material: ley formal = la aprobada por el Parlamento siguiendo el procedimiento legislativo; ley material = toda norma jurídica general, venga de donde venga. El presupuesto, para Laband, es ley formal pero no material. Confundirla con la distinción público/privado es el error habitual.'},

{id:'u4_06', unit:4, q:'En la teoría del "negocio jurídico" de De Castro, los elementos del negocio jurídico se clasifican en:',
 opts:['Elementos esenciales (sin los que no existe el negocio), naturales (propios del tipo salvo pacto en contrario) y accidentales (incorporados por voluntad de las partes)','Elementos formales (escritura, firma, notarización), materiales (consentimiento, objeto) y causales (finalidad)','Elementos subjetivos (partes), objetivos (prestación) y teleológicos (causa del negocio)','Elementos normativos (previstos por ley), convencionales (acordados por las partes) y judiciales (integrados por el juez)'],
 ans:0, exp:'La tricotomía de De Castro, con antecedentes romanos (essentialia, naturalia, accidentalia negotii): esenciales (sin ellos el negocio no existe o degenera en otro tipo), naturales (se sobreentienden salvo exclusión) y accidentales (condición, término, modo). El error frecuente es mezclarlos con los elementos de los contratos del art. 1261 CC.'},

{id:'u4_07', unit:4, q:'La distinción entre "acto nulo" y "acto anulable" en derecho civil consiste en que:',
 opts:['El acto nulo no produce efectos desde el principio (ipso iure) y cualquiera con interés puede invocarlo; el acto anulable produce efectos hasta que es impugnado por la persona legitimada en el plazo legal','El acto nulo puede ser convalidado por las partes; el anulable, no','El acto nulo solo puede declararlo un juez; el anulable se extingue automáticamente por el mero transcurso del tiempo','Los actos nulos son siempre de derecho público; los anulables, de derecho privado'],
 ans:0, exp:'Nulidad absoluta: ineficacia radical desde el origen, imprescriptible, invocable por cualquier interesado o de oficio. Anulabilidad: eficacia provisional, acción de impugnación reservada a la parte protegida, sujeta a plazo de caducidad, susceptible de confirmación. Invertir estas características es el error más común.'},

{id:'u4_08', unit:4, q:'La "relación jurídica" puede definirse como:',
 opts:['Un vínculo entre sujetos de derecho regulado por el ordenamiento jurídico, que atribuye a uno un poder o derecho subjetivo y al otro un deber o sujeción correlativa','Una situación de hecho que produce efectos jurídicos por disposición de la ley, con independencia de la voluntad de los sujetos','El conjunto de normas que regulan una determinada materia dentro de un ordenamiento positivo','El proceso lógico de subsunción del supuesto de hecho en la norma aplicable por parte del intérprete'],
 ans:0, exp:'La relación jurídica (Savigny) es un vínculo intersubjetivo: un sujeto activo con poder/derecho y un sujeto pasivo con deber/sujeción, regulados por el ordenamiento. No toda situación jurídicamente relevante es una relación jurídica en sentido estricto.'},

{id:'u4_09', unit:4, q:'Según Savigny, el "estado civil" de la persona comprende dos dimensiones fundamentales:',
 opts:['El status civitatis (pertenencia a una comunidad política) y el status familiae (posición en la familia), que determinan la capacidad jurídica concreta del individuo','El status económico (patrimonio) y el status social (clase), que el derecho romano reconocía como condicionantes de la personalidad','El status libertatis (libertad o esclavitud) y el status civitatis (ciudadanía), únicos relevantes en el derecho romano clásico','El estado civil moderno es una simplificación de Savigny que solo reconoce el vínculo matrimonial y la filiación'],
 ans:0, exp:'Savigny analiza el estado civil en el derecho romano y destaca: status civitatis (ciudadanía, pertenencia a la comunidad) y status familiae (posición en la organización familiar). En Roma también existía el status libertatis, pero Savigny subraya especialmente los dos primeros en su teoría del derecho subjetivo.'},

{id:'u4_10', unit:4, q:'La concepción "monista" de la ley, asociada a la tradición francesa revolucionaria, implica que:',
 opts:['Toda norma jurídica general emanada del Parlamento es ley, sin distinción entre sentido formal y material: la forma parlamentaria y la generalidad normativa coinciden','La ley tiene dos dimensiones (formal y material) que pueden no coincidir en determinados actos parlamentarios','El reglamento puede tener la misma fuerza que la ley cuando la urgencia así lo exija','Solo el poder ejecutivo está habilitado para dictar normas con contenido material regulatorio'],
 ans:0, exp:'La concepción monista (Revolución Francesa) identifica ley con todo acto del Parlamento: no hay separación entre el sentido formal y el material. La concepción dualista (Laband, Jellineck) introduce la distinción. Francia parte de la unidad; Alemania, de la dualidad.'},

{id:'u4_11', unit:4, q:'El concepto de "tutela" se distingue del de "curatela" (antes de la reforma de la Ley 8/2021) en que:',
 opts:['La tutela era una institución de representación legal plena para quien carecía de capacidad de obrar; la curatela era una institución de asistencia o complemento para quien tenía capacidad limitada','La tutela se aplica a los mayores de edad; la curatela, exclusivamente a los menores','La tutela opera en el derecho público; la curatela, en el derecho privado','La tutela es irrevocable; la curatela puede ser retirada por el propio afectado en cualquier momento'],
 ans:0, exp:'Antes de la reforma de 2021: tutela = representación total (incapacitados judicialmente, menores sin patria potestad); curatela = asistencia puntual (pródigos, emancipados con limitaciones). La Ley 8/2021 potencia la curatela representativa y suprime la tutela para mayores de edad. La distinción representación/asistencia es la clave.'},

// ── UD5 · TEORÍAS DE LA JUSTICIA ──────────────────────────────────────────
{id:'u5_01', unit:5, q:'El "segundo Radbruch" —tras la Segunda Guerra Mundial— modifica su posición iusfilosófica al sostener que:',
 opts:['Las normas positivas que superan un umbral de injusticia extrema pierden su carácter jurídico y no obligan, incluso si han sido dictadas conforme al procedimiento legal vigente','Las normas jurídicas son siempre válidas independientemente de su contenido moral, y solo pueden ser cuestionadas mediante reforma democrática','El derecho natural proporciona un sistema completo de normas que sustituye al derecho positivo cuando este es injusto','La justicia es un ideal inalcanzable que no puede incorporarse como criterio de validez del derecho positivo'],
 ans:0, exp:'La "fórmula de Radbruch": cuando la injusticia de una norma positiva supera cierto umbral (gesetzliches Unrecht, injusticia legal extrema), deja de ser derecho. No defiende la sustitución total por el derecho natural ni la resignación positivista. Es una posición matizada con repercusiones directas en la jurisprudencia alemana de posguerra.'},

{id:'u5_02', unit:5, q:'El neotomismo jurídico contemporáneo, en su versión mayoritaria, se diferencia del iusnaturalismo de John Finnis en que:',
 opts:['El neotomismo mayoritario apela a la metafísica del ser para fundamentar la ley natural; Finnis rechaza el argumento "desde la naturaleza" y fundamenta los bienes básicos en la razón práctica directamente','El neotomismo mayoritario niega la existencia de derechos subjetivos naturales; Finnis los considera el núcleo del derecho natural','El neotomismo mayoritario defiende la separación absoluta entre moral y derecho; Finnis las integra en una teoría unificada','El neotomismo mayoritario es relativista en materia moral; Finnis es absolutista'],
 ans:0, exp:'Finnis (Natural Law and Natural Rights, 1980) critica la "falacia naturalista" que va del ser al deber ser y fundamenta los bienes básicos —incluyendo la justicia— directamente en la razón práctica, sin deducirlos de la naturaleza humana como hecho biológico. El neotomismo tradicional sí apela a la metafísica del ser.'},

{id:'u5_03', unit:5, q:'El imperativo categórico de Kant, en su formulación de la universabilidad, puede enunciarse como:',
 opts:['Actúa solo según aquella máxima que puedas querer que se convierta en ley universal','Actúa de modo que la humanidad, tanto en tu persona como en la de cualquier otro, sea tratada siempre como un fin y nunca meramente como un medio','Los seres racionales se reconocen como legisladores en el reino de los fines, sometidos a leyes que ellos mismos se dan','El deber moral solo existe cuando el cumplimiento de la norma produce el mayor bien para el mayor número'],
 ans:0, exp:'Kant formula el imperativo categórico de tres maneras principales. La primera (fórmula de la universabilidad): obra solo según aquella máxima que puedas universalizar. La segunda (fórmula de la humanidad): trata a las personas siempre como fines. La tercera (fórmula del reino de los fines): actúa como legislador universal. Las tres son formulaciones del mismo imperativo pero con diferente énfasis.'},

{id:'u5_04', unit:5, q:'Habermas y su teoría de la razón comunicativa implican para el derecho que:',
 opts:['Las normas jurídicas son legítimas cuando pueden ser aceptadas por todos los afectados en un proceso de discurso práctico bajo condiciones ideales de comunicación','Las normas jurídicas son legítimas cuando maximizan la utilidad social agregada de la comunidad','La legitimidad del derecho depende de su conformidad con principios morales objetivos derivados de la naturaleza humana','Las normas son legítimas cuando emanan del soberano legalmente constituido, con independencia de su contenido'],
 ans:0, exp:'Habermas: legitimidad por procedimiento discursivo. Las normas son válidas cuando pueden ser justificadas ante todos los afectados en condiciones de comunicación libre (sin coerción, sin asimetría). No es utilitarismo ni iusnaturalismo ni positivismo de la voluntad soberana.'},

{id:'u5_05', unit:5, q:'La diferencia principal entre el utilitarismo de Bentham y el de Mill radica en que:',
 opts:['Bentham considera que todos los placeres son cualitativamente iguales y solo difieren en cantidad; Mill introduce distinciones cualitativas entre placeres superiores (intelectuales) e inferiores (físicos)','Bentham extiende el cálculo de utilidad a los animales; Mill lo restringe a los seres humanos racionales','Bentham rechaza la codificación del derecho; Mill la defiende como vía para maximizar la felicidad social','Bentham prioriza la libertad individual; Mill, la utilidad colectiva por encima de cualquier derecho individual'],
 ans:0, exp:'Bentham: utilitarismo hedónico cuantitativo ("pushpin as good as poetry"). Mill: hay placeres superiores (intelectuales, morales) que no pueden compararse solo en cantidad con los inferiores. Ambos son utilitaristas y defensores de la codificación. Mill introduce la distinción cualitativa para responder a la objeción de que el utilitarismo es una "filosofía de cerdos".'},

{id:'u5_06', unit:5, q:'El "velo de la ignorancia" en la teoría de Rawls es un dispositivo que sirve para:',
 opts:['Garantizar la imparcialidad de los principios de justicia elegidos, impidiendo que los participantes conozcan su posición social, talentos, plan de vida o circunstancias particulares','Ilustrar que la justicia es imposible de conocer, pues siempre estará condicionada por los intereses particulares','Establecer que los principios de justicia deben derivarse de la tradición histórica de cada comunidad, ocultando las preferencias individuales','Demostrar que los individuos elegirían el principio de maximización de la utilidad agregada si desconocieran su posición social'],
 ans:0, exp:'El velo de la ignorancia garantiza que los principios elegidos en la posición original sean imparciales: nadie sabe si será rico o pobre, dotado o no. Rawls critica explícitamente que esa situación no conduciría al utilitarismo sino a sus dos principios: libertades básicas y principio de diferencia. La última opción invierte la conclusión de Rawls.'},

{id:'u5_07', unit:5, q:'Los dos principios de justicia de Rawls, en el orden lexicográfico correcto, son:',
 opts:['Primer principio: garantía de las libertades básicas iguales para todos; segundo principio: las desigualdades económicas y sociales solo son admisibles si benefician a los miembros más desfavorecidos (principio de diferencia) y van ligadas a cargos abiertos a todos (igualdad equitativa de oportunidades)','Primer principio: maximización de la utilidad agregada; segundo principio: distribución equitativa de esa utilidad entre todos los miembros de la sociedad','Primer principio: igualdad de oportunidades económicas; segundo principio: libertades básicas solo garantizadas cuando no dañen el bienestar de los más pobres','Primer principio: principio de diferencia a favor de los más desfavorecidos; segundo principio: libertades básicas iguales para todos'],
 ans:0, exp:'El orden lexicográfico importa: primero las libertades (no pueden sacrificarse por igualdad económica); después las desigualdades económicas (admisibles si favorecen al peor situado y los cargos son accesibles). La última opción invierte los principios. La segunda describe el utilitarismo que Rawls critica.'},

{id:'u5_08', unit:5, q:'La "regla del maximín" en la teoría de Rawls consiste en:',
 opts:['Elegir la alternativa cuyo peor resultado posible sea mejor que el peor resultado posible de cualquier otra alternativa (maximizar el mínimo)','Elegir la alternativa que maximice el resultado esperado ponderado por la probabilidad de cada escenario','Elegir la alternativa que beneficie al mayor número posible de personas, aunque el mínimo sea muy bajo','Elegir la alternativa más igualitaria entre aquellas que maximizan la utilidad total'],
 ans:0, exp:'Maximín: max del min. Bajo el velo de la ignorancia, los individuos racionales preferirán la alternativa cuyo peor escenario sea el menos malo posible, porque no conocen si serán los más desfavorecidos. Es una estrategia de aversión al riesgo, no de maximización de expectativas (que sería la regla Bayesiana).'},

{id:'u5_09', unit:5, q:'La crítica de Rawls al utilitarismo se fundamenta principalmente en que:',
 opts:['El utilitarismo permite sacrificar los derechos o el bienestar de una minoría si ello maximiza la utilidad agregada de la mayoría, lo que es incompatible con la inviolabilidad de la persona','El utilitarismo es demasiado igualitario y no permite ninguna desigualdad social o económica entre los miembros de la comunidad','El utilitarismo requiere demasiada información sobre las preferencias individuales y es imposible de aplicar en la práctica','El utilitarismo presupone una concepción del bien común que Rawls considera incompatible con el pluralismo liberal'],
 ans:0, exp:'Rawls critica que el utilitarismo no toma en serio "la distinción entre personas": agrega utilidades como si la sociedad fuera un único individuo, lo que puede justificar sacrificar a individuos concretos. La cuarta opción es relevante pero no es la crítica principal; la segunda es errónea (el utilitarismo no es igualitario en ese sentido).'},

{id:'u5_10', unit:5, q:'Las teorías "cognitivistas" en metaética se distinguen de las "no cognitivistas" en que:',
 opts:['El cognitivismo sostiene que los juicios morales son proposiciones que pueden ser verdaderas o falsas; el no cognitivismo niega que los juicios morales tengan valor de verdad (son expresiones emotivas, prescripciones o compromisos)','El cognitivismo defiende que la moral es innata; el no cognitivismo, que es aprendida culturalmente','El cognitivismo es una posición propia del iusnaturalismo; el no cognitivismo, del positivismo jurídico','El cognitivismo solo acepta los juicios morales derivados de la razón; el no cognitivismo acepta también los basados en la intuición'],
 ans:0, exp:'La distinción metaética fundamental: cognitivismo (los enunciados morales son proposiciones verdaderas o falsas; hay conocimiento moral posible) vs. no cognitivismo (los enunciados morales no son proposiciones sino expresiones —emotivismo de Ayer, Stevenson— o prescripciones —prescriptivismo de Hare—). No es una distinción sobre origen innato/aprendido.'},

{id:'u5_11', unit:5, q:'El "equilibrio reflexivo" en la metodología moral de Rawls consiste en:',
 opts:['Un proceso iterativo de ajuste mutuo entre intuiciones morales particulares y principios generales, hasta alcanzar una coherencia satisfactoria entre ambos niveles','La decisión racional que tomarían individuos perfectamente informados bajo condiciones ideales de imparcialidad','La aceptación de los principios de justicia por consenso mayoritario en una deliberación pública democrática','La derivación deductiva de normas morales concretas a partir de principios formales a priori sin apelación a intuiciones'],
 ans:0, exp:'El equilibrio reflexivo (reflective equilibrium) no es un punto de partida sino un proceso: se parte de intuiciones, se formulan principios, se revisan las intuiciones que los principios no pueden acomodar, se ajustan los principios... hasta el equilibrio. No es un procedimiento único de "posición original"; esa es otra pieza del método rawlsiano.'},

{id:'u5_12', unit:5, q:'El "primer Radbruch" (antes de 1933) se caracterizaba por defender:',
 opts:['Un relativismo jurídico: el contenido del derecho depende de opciones valorativas que el jurista no puede resolver científicamente, por lo que el jurista debe someterse al derecho positivo vigente','Un iusnaturalismo racionalista: los principios de justicia son cognoscibles por la razón y vinculan al legislador','Un positivismo de la eficacia: solo el derecho que efectivamente se cumple tiene carácter jurídico','Un realismo jurídico: el derecho es lo que deciden los jueces, con independencia del texto normativo'],
 ans:0, exp:'El primer Radbruch es un positivista relativista: dado que los valores son relativos y el jurista no puede resolverlos científicamente, debe aplicar el derecho positivo. El nazismo y sus leyes lo llevan a revisar esta postura y a establecer que hay un mínimo de justicia sin el cual una norma no es derecho.'},

{id:'u5_13', unit:5, q:'Los tres principios de justicia que Kant identifica son:',
 opts:['Libertad (autonomía de cada miembro de la sociedad como ser humano), igualdad (como súbdito ante la ley) e independencia civil (como ciudadano)','Libertad, fraternidad e igualdad, en consonancia con los ideales de la Revolución Francesa','Beneficencia, no maleficencia y autonomía, principios del pensamiento moral kantiano aplicados al derecho','Universabilidad, humanidad y autonomía, derivados de las tres formulaciones del imperativo categórico'],
 ans:0, exp:'En "Teoría y Práctica" y en la "Metafísica de las Costumbres", Kant identifica tres principios del estado civil justo: libertad (autonomía moral y jurídica), igualdad (ante la ley, sin privilegios) e independencia civil (capacidad de ciudadanía activa). No son los de la Revolución Francesa, aunque haya coincidencia parcial.'},

// ── UD6 · CUESTIONES ACTUALES EN FILOSOFÍA JURÍDICA ──────────────────────
{id:'u6_01', unit:6, q:'Las tres características fundamentales de los derechos humanos, según la doctrina dominante, son:',
 opts:['Universalidad (corresponden a todos los seres humanos por serlo), inviolabilidad (no pueden ser desconocidos por el Estado o los particulares) e inalienabilidad (no pueden renunciarse ni transferirse)','Universalidad, positividad (deben estar recogidos en el derecho escrito) y exigibilidad judicial (deben poder reclamarse ante un tribunal)','Indivisibilidad, progresividad y no regresividad, conforme a los estándares del derecho internacional de los derechos humanos','Fundamentalidad (rango constitucional), universalidad y eficacia directa (aplicables sin desarrollo legislativo)'],
 ans:0, exp:'Las tres características clásicas son universalidad, inviolabilidad e inalienabilidad. La positividad y la exigibilidad judicial son condiciones para su efectividad, no características definitorias. Indivisibilidad y progresividad son principios del DIDH, distintos de las características estructurales.'},

{id:'u6_02', unit:6, q:'Las "tres generaciones de derechos humanos" de Karel Vašák se corresponden con:',
 opts:['Primera generación: derechos civiles y políticos (libertad); segunda: derechos económicos, sociales y culturales (igualdad); tercera: derechos de solidaridad o colectivos (fraternidad)','Primera generación: derechos individuales; segunda: derechos colectivos; tercera: derechos intergeneracionales o de las generaciones futuras','Primera generación: derechos negativos; segunda: derechos positivos; tercera: derechos de procedimiento','Primera generación: derechos naturales; segunda: derechos positivos; tercera: derechos emergentes sin reconocimiento jurídico formal'],
 ans:0, exp:'Vašák (1977) usa explícitamente la tríada lema revolucionario francés: libertad (civiles y políticos), igualdad (económicos, sociales, culturales), fraternidad (solidaridad: paz, desarrollo, medio ambiente sano, etc.). Las otras opciones mezclan clasificaciones distintas.'},

{id:'u6_03', unit:6, q:'La distinción entre "derechos humanos" y "derechos fundamentales" según Pérez Luño se basa en que:',
 opts:['Los derechos humanos son una categoría moral o iusnaturalista previa al derecho positivo; los derechos fundamentales son los derechos humanos positivizados en el ordenamiento constitucional de un Estado','Los derechos humanos solo corresponden a los ciudadanos nacionales; los derechos fundamentales, a todos los seres humanos','Los derechos humanos son judicialmente exigibles; los derechos fundamentales, solo programas de acción política','Los derechos fundamentales tienen rango superior a los derechos humanos porque están recogidos en tratados internacionales vinculantes'],
 ans:0, exp:'Para Pérez Luño: derechos humanos = dimensión axiológica o moral (lo que debería ser reconocido); derechos fundamentales = positivización constitucional de esos derechos (lo que el Estado ha reconocido formalmente). La inversión de la jerarquía en la cuarta opción es un error conceptual frecuente.'},

{id:'u6_04', unit:6, q:'Los cuatro principios de bioética de Beauchamp y Childress, en el orden convencional, son:',
 opts:['Autonomía (respetar la capacidad de decisión del paciente), beneficencia (actuar en favor del paciente), no maleficencia (evitar causarle daño) y justicia (distribuir equitativamente los recursos sanitarios)','Autonomía, solidaridad, precaución y proporcionalidad, derivados del Convenio de Oviedo de 1997','Consentimiento informado, confidencialidad, no discriminación y acceso equitativo a los tratamientos','Veracidad, lealtad, justicia y beneficencia, conforme a la tradición hipocrática reformulada'],
 ans:0, exp:'Los cuatro principios del principialismo de Georgetown (Beauchamp y Childress, 1979): autonomía, beneficencia, no maleficencia y justicia. No proceden del Convenio de Oviedo (que es de 1997 y tiene otro contenido). La confusión con el Convenio de Oviedo es el error más frecuente en este punto.'},

{id:'u6_05', unit:6, q:'El Convenio de Oviedo de 1997 (Convenio sobre los Derechos Humanos y la Biomedicina) es relevante para el bioderecho principalmente porque:',
 opts:['Establece el primer instrumento jurídico internacional vinculante que regula la protección de los derechos de las personas ante las aplicaciones de la biología y la medicina','Crea un tribunal internacional específico para juzgar violaciones de derechos relacionados con la biomedicina','Define los cuatro principios de bioética (autonomía, beneficencia, no maleficencia y justicia) como normas jurídicas vinculantes','Prohíbe expresamente la investigación científica con seres humanos en cualquier circunstancia'],
 ans:0, exp:'El Convenio de Oviedo (Consejo de Europa, 1997) es el primer tratado internacional jurídicamente vinculante en biomedicina. No crea un tribunal propio (las violaciones se llevan al TEDH). Los cuatro principios de Beauchamp y Childress son doctrina bioética, no el contenido del Convenio.'},

{id:'u6_06', unit:6, q:'La posición "asimilacionista" ante la diversidad cultural, en el debate sobre multiculturalismo, defiende que:',
 opts:['Los individuos de minorías culturales deben integrarse en la cultura mayoritaria, adoptando sus normas y valores, con eventual pérdida de la identidad cultural de origen','Las culturas tienen igual valor intrínseco y sus normas deben respetarse aunque contradigan los derechos humanos universales','El Estado debe acomodar las prácticas culturales de todas las minorías mediante derechos de grupo diferenciados','La diversidad cultural enriquece a la sociedad y debe preservarse activamente mediante políticas públicas de reconocimiento'],
 ans:0, exp:'El asimilacionismo exige que las minorías adopten la cultura dominante. El relativismo cultural reconoce igual valor a todas las culturas sin jerarquización externa. El multiculturalismo (Kymlicka) defiende derechos de grupo. Las opciones 3 y 4 describen posiciones multiculturalistas, no asimilacionistas.'},

{id:'u6_07', unit:6, q:'El "derecho al desarrollo" reconocido en la Resolución 41/128 de la AGONU de 1986 se caracteriza por ser:',
 opts:['Un derecho humano inalienable en virtud del cual todo ser humano y todos los pueblos tienen el derecho de participar, contribuir y disfrutar del desarrollo económico, social, cultural y político','Un derecho exclusivamente de los Estados en desarrollo frente a los países industrializados, sin dimensión individual','Un derecho generacional dirigido a proteger los intereses de las generaciones futuras, no de las actuales','Un derecho reconocido exclusivamente a los ciudadanos de los países menos desarrollados según los criterios del PNUD'],
 ans:0, exp:'La Resolución 41/128 reconoce el derecho al desarrollo como derecho humano individual y colectivo: toda persona y todo pueblo tiene derecho a participar en el desarrollo y beneficiarse de él. No es solo un derecho estatal ni exclusivamente para generaciones futuras.'},

{id:'u6_08', unit:6, q:'La distinción entre "paz negativa" y "paz positiva" en la filosofía de los derechos humanos es:',
 opts:['La paz negativa es la mera ausencia de guerra o conflicto armado; la paz positiva implica la eliminación de las causas estructurales de la violencia y la construcción de condiciones de justicia social','La paz negativa es la garantizada por el derecho internacional; la paz positiva, la que garantiza el derecho interno de cada Estado','La paz negativa corresponde a las relaciones entre Estados; la paz positiva, a las relaciones entre individuos dentro de un Estado','La paz negativa es el objetivo del derecho humanitario; la paz positiva, el objetivo del derecho de los derechos humanos'],
